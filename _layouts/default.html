<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5KDHJLQ3');</script>
    <!-- End Google Tag Manager -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1b2a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="me" href="https://www.linkedin.com/in/dkharlanau" />
    {%- seo -%}
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  </head>
  <body class="site">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5KDHJLQ3"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
  
    <main id="content" class="page-content wrapper">
      {{ content }}
    </main>
    <footer class="site-footer">
      {% include footer.html %}
    </footer>
    {% assign primary_education = site.data.resume.education | first %}
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Dzmitryi Kharlanau",
        "jobTitle": "Senior SAP Order-to-Cash Consultant",
        "image": "{{ '/assets/img/DzmitryiKharlanau.png' | absolute_url }}",
        "url": "{{ site.url | append: page.url }}",
        "sameAs": [
          "https://www.linkedin.com/in/dkharlanau",
          "https://hashnode.com/@dkharlanau",
          "https://medium.com/@dkharlanau",
          "https://www.reddit.com/user/dkharlanau",
          "https://x.com/dkharlanau"
        ],
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "contactType": "Business inquiries",
            "url": "https://www.linkedin.com/in/dkharlanau",
            "availableLanguage": ["English"]
          }
        ],
        {% if primary_education %}
        "alumniOf": {
          "@type": "EducationalOrganization",
          "name": "{{ primary_education.notes | default: primary_education.school }}"
        },
        {% endif %}
        "worksFor": {
          "@type": "Organization",
          "name": "EPAM Systems"
        },
        "knowsAbout": [
          "SAP S/4HANA",
          "Order-to-Cash",
          "Digital Transformation",
          "Enterprise Integration",
          "AI Automation"
        ],
        "description": "SAP S/4HANA Order-to-Cash consultant helping enterprises modernize operations, integrate ecosystems, and automate with confidence."
      }
    </script>
  </body>
</html>
