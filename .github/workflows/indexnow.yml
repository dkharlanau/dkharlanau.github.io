name: IndexNow Submit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no network submission)'
        required: false
        default: false
        type: boolean
      use_all:
        description: 'Submit all indexable URLs instead of only changed URLs from git diff'
        required: false
        default: false
        type: boolean
      max_urls:
        description: 'Maximum number of URLs to submit'
        required: false
        default: 100
        type: number

jobs:
  indexnow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install pytest pyyaml

      - name: Generate DAMA pages
        run: node scripts/generate_dama_pages.js

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Check local links
        run: python3 scripts/check_links.py _site

      - name: Check SEO metadata
        run: python3 scripts/check_seo.py _site

      - name: Determine URL scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.use_all }}" = "true" ]; then
            echo "flag=--all" >> "$GITHUB_OUTPUT"
            echo "scope=all indexable URLs" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--from-git-diff HEAD~1 HEAD" >> "$GITHUB_OUTPUT"
            echo "scope=changed URLs from git diff (HEAD~1..HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Check IndexNow key availability
        id: key
        if: github.event_name != 'pull_request' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -n "$INDEXNOW_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "IndexNow key secret is present."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::warning::INDEXNOW_KEY secret is not configured. Skipping real IndexNow submission."
            else
              echo "::error::INDEXNOW_KEY secret is required for real submission but is not configured in repository secrets."
              exit 1
            fi
          fi

      - name: Report IndexNow mode
        id: mode
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "URL scope: ${{ steps.scope.outputs.scope }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Mode: DRY RUN (no network submission; pull request)"
            echo "status=dry_run" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Mode: DRY RUN (manual dispatch)"
            echo "status=dry_run" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.key.outputs.present }}" = "true" ]; then
            echo "Mode: REAL SUBMISSION"
            echo "status=submitted" >> "$GITHUB_OUTPUT"
          else
            echo "Mode: SKIPPED (missing secret)"
            echo "status=skipped_missing_secret" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run IndexNow submission
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == true)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_KEY_LOCATION: ${{ vars.INDEXNOW_KEY_LOCATION }}
        run: |
          python3 scripts/indexnow_submit.py \
            --site-dir _site \
            --report indexnow-report.json \
            --max-urls ${{ github.event_name == 'workflow_dispatch' && inputs.max_urls || 100 }} \
            ${{ steps.scope.outputs.flag }}

      - name: Real IndexNow submission
        if: steps.key.outputs.present == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false))
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_KEY_LOCATION: ${{ vars.INDEXNOW_KEY_LOCATION }}
        run: |
          python3 scripts/indexnow_submit.py \
            --submit \
            --require-key-file \
            --site-dir _site \
            --report indexnow-report.json \
            --max-urls ${{ github.event_name == 'workflow_dispatch' && inputs.max_urls || 100 }} \
            ${{ steps.scope.outputs.flag }}

      - name: Upload IndexNow report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexnow-report-${{ github.run_id }}
          path: indexnow-report.json
          if-no-files-found: ignore

      - name: IndexNow status
        if: always()
        run: |
          echo "IndexNow status: ${{ steps.mode.outputs.status }}"

      - name: IndexNow report summary
        if: always()
        run: |
          echo "## IndexNow Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f indexnow-report.json ]; then
            mode=$(python3 -c "import json,sys; print(json.load(open('indexnow-report.json')).get('mode','unknown'))")
            submitted=$(python3 -c "import json,sys; print(len(json.load(open('indexnow-report.json')).get('submitted',[])))" 2>/dev/null || echo 0)
            skipped=$(python3 -c "import json,sys; print(len(json.load(open('indexnow-report.json')).get('skipped',[])))" 2>/dev/null || echo 0)
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | ${{ steps.mode.outputs.status }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Mode | $mode |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Submitted URLs | $submitted |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped URLs | $skipped |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Submitted URLs</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "import json,sys; [print('- '+u) for u in json.load(open('indexnow-report.json')).get('submitted',[])]" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Status: ${{ steps.mode.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No report was generated for this run." >> "$GITHUB_STEP_SUMMARY"
          fi
