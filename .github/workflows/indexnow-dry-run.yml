name: IndexNow Dry-Run & Submit

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      submit:
        description: 'Perform real IndexNow submission (requires INDEXNOW_KEY secret)'
        required: false
        default: false
        type: boolean
      use_all:
        description: 'Submit all indexable URLs instead of only changed URLs from git diff'
        required: false
        default: false
        type: boolean

jobs:
  indexnow:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Audit discovery outputs
        run: python3 scripts/audit_discovery_outputs.py _site --warn-only

      - name: Determine URL scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.use_all }}" = "true" ]; then
            echo "flag=--all" >> "$GITHUB_OUTPUT"
            echo "scope=all indexable URLs" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--from-git-diff HEAD~1 HEAD" >> "$GITHUB_OUTPUT"
            echo "scope=changed URLs from git diff (HEAD~1..HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Report mode
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "URL scope: ${{ steps.scope.outputs.scope }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.submit }}" = "true" ]; then
            echo "Mode: REAL SUBMISSION"
          else
            echo "Mode: DRY RUN (no network submission)"
          fi

      - name: Dry-run IndexNow submission
        if: github.event_name != 'workflow_dispatch' || inputs.submit == false
        run: python3 scripts/indexnow_submit.py ${{ steps.scope.outputs.flag }}

      - name: Verify IndexNow key secret
        if: github.event_name == 'workflow_dispatch' && inputs.submit == true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "::error::INDEXNOW_KEY secret is required for real submission but is not configured in repository secrets."
            exit 1
          fi
          echo "IndexNow key secret is present."

      - name: Real IndexNow submission
        if: github.event_name == 'workflow_dispatch' && inputs.submit == true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python3 scripts/indexnow_submit.py --submit ${{ steps.scope.outputs.flag }}
