analysis:
  eyebrow: Reading the pattern
  title: What the learning record supports
  items:
    - title: SAP foundation first
      body: "Early coursework and work history are clearly SAP-centered: SD order fulfillment, ABAP, testing, workflow, and logistics-related topics."
    - title: Architecture and integration later
      body: Later public writing and skills point toward integration, event-driven thinking, data governance, and API-oriented work rather than pure module-only depth.
    - title: Recent AI wave is real but recent
      body: The 2025-2026 credential cluster is strong enough to show active upskilling in AI and agentic tooling, but it should be framed as an emerging direction rather than a long-standing specialization.
    - title: Leadership claims stay secondary
      body: Management and leadership courses exist, but the record supports careful wording around coordination and structured delivery rather than executive-style positioning.

timeline:
  eyebrow: Chronology
  title: From SAP education to recent AI credentials
  intro: The timeline highlights the clearest milestones from formal study, SAP learning, and recent public credentials.
  items:
    - title: BSc in Economic Informatics
      provider: Belarus State Economic University (BSEU)
      date: "2014"
      kind: education
      emphasis: Foundational
      summary: Degree claim appears in the LinkedIn profile summary and aligns with the BSEU SAP University Alliances entry.
    - title: SAP University Alliances programme
      provider: Belarus State Economic University (BSEU)
      date: "2012-12 to 2013-06"
      kind: education
      emphasis: SAP entry point
      summary: TERP10 and SAP ERP integration training, including a diploma project related to SAP add-on development for localizations.
    - title: OpenSAP learning track
      provider: openSAP
      date: "2013-2018"
      kind: education
      emphasis: Platform depth
      summary: Self-directed SAP coursework across analytics, HANA, workflow, migration, and design topics.
    - title: SAP SD Order Fulfillment I and II
      provider: SAP
      date: "2014"
      kind: course
      emphasis: Core process depth
      summary: Strong early signal for order-to-cash and SAP SD process fundamentals.
    - title: ABAP Workbench, Objects, Debugger, and Dictionary
      provider: SAP
      date: "2014-2015"
      kind: course
      emphasis: Technical depth
      summary: Supports the later ABAP developer role and technical troubleshooting work.
    - title: Retail and apparel coursework
      provider: SAP
      date: "2015-2016"
      kind: course
      emphasis: Domain specialization
      summary: Apparel, footwear, planning, and allocation topics align with later AFS and retail support work.
    - title: EF SET English Certificate 69/100 (C1 Advanced)
      provider: EF SET
      date: "2025-02"
      kind: certification
      emphasis: Publicly verifiable
      summary: Strongest publicly accessible language credential in the export.
      url: "https://cert.efset.org/en/BgQpas"
    - title: SAP MDG and retail record-of-achievement badges
      provider: SAP
      date: "2025-05"
      kind: certification
      emphasis: Domain reinforcement
      summary: Public SAP learning signals around MDG and retail functions/business processes.
    - title: Event-Driven Integration with SAP Integration Suite, Advanced Event Mesh
      provider: SAP
      date: "2025-08"
      kind: certification
      emphasis: Modern integration
      summary: Strong public badge for event-driven integration direction.
      url: "https://www.credly.com/badges/60ffffa9-49d1-448d-9988-fdded8986964/public_url"
    - title: Anthropic AI credential cluster
      provider: Anthropic
      date: "2025-08 to 2026-04"
      kind: certification
      emphasis: Emerging direction
      summary: Recent public credentials across Claude API usage, MCP, subagents, agent skills, and architecture foundations.
      url: "https://verify.skilljar.com/c/jmge56n6m5ga"

focus_areas:
  eyebrow: Learning Themes
  title: What the learning mix now points to
  groups:
    - title: Established base
      note: High-confidence areas supported by both study and work history.
      items:
        - SAP SD and order-to-cash
        - SAP logistics and automotive contexts
        - ABAP and SAP framework troubleshooting
        - Integration testing and delivery support
    - title: Strengthening themes
      note: Supported by newer writing, current-role wording, and selected credentials.
      items:
        - SAP MDG and data governance
        - API-oriented integration work
        - Event-driven architecture
        - Structured AMS improvement
    - title: Emerging directions
      note: Real and recent, but should be presented carefully.
      items:
        - Agentic AI tooling
        - Practical AI for delivery workflows
        - AI-assisted coding and experimentation
        - Leadership-related self-development

