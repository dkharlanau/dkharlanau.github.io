evidence_gaps:
  - The LinkedIn export contains publication URLs but not full article bodies. Theme extraction depended on reachable snippets and accessible pages.
  - The export includes overlapping current EPAM titles that may represent concurrent roles, profile experimentation, or profile cleanup needs.
  - Formal degree evidence is indirect; the BSc claim is in the profile summary, not in Education.csv.
  - Some strong public-site claims about measurable AMS outcomes, lower TCO, or leadership depth are not directly corroborated by independent source material in this repo.
verification_issues:
  - LinkedIn certificate and article pages are only partially accessible in headless retrieval, so many entries are classified as `public_verifiable: partial`.
  - Credly pages expose limited metadata without JavaScript; public URLs are preserved, but some details remain partially verified.
  - Duplicate export rows existed for `Introduction to Model Context Protocol` and `Introduction to subagents`; the registry keeps deduplicated entries.
  - Several generic LinkedIn Learning credentials are real but low-signal for public positioning and should remain background registry data only.
deferred_homepage_recommendations:
  - Do not lead the homepage with AMS-transformation or lower-TCO claims unless the about/profile data has first been fully grounded in the audit registry.
  - If homepage profile messaging is revised later, anchor it to SAP SD/logistics/integration/MDG evidence rather than abstract leadership or consulting language.
