content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "SAP AMS وأتمتة الدعم بالذكاء الاصطناعي وتحسين العمليات"
    subtitle: "أعمل في دعم SAP AMS، وتحليل الحوادث، ومسائل SD/MM، ومشكلات البيانات الرئيسية، وسير العمل المدعوم بالذكاء الاصطناعي الذي يساعد فرق الدعم على تقليل الجهد المتكرر وتحسين المعرفة التشغيلية."
    current_role: 'أستند إلى خبرة عملية في SAP عبر الدعم واللوجستيات والبيانات الرئيسية والترحيل والتحليل التشغيلي — وأعمل حالياً بصفة Senior SAP Consultant لدى <a href="https://www.epam.com" target="_blank" rel="noopener noreferrer">EPAM Systems</a>.'
    person_meta: "استشارات SAP AMS وأتمتة الدعم"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "تواصل عبر LinkedIn", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}]}
    visual:
      header_label: "تكلفة ملكية أقل $ ↓<br>اعتماد أقل<br>ابتكار أكبر ↑"
      title: "حلقة القيمة التشغيلية"
      items:
        - {title: "خفض تكلفة التشغيل", metric: "↓ 10–20% من أعباء التسليم", detail: "قلّل التحليل المتكرر وجهد الدعم المتكرر وأعباء التنسيق التي يمكن تجنبها."}
        - {title: "خفض الاعتماد", metric: "↑ 20–40% معرفة قابلة لإعادة الاستخدام", detail: "حوّل السياق الحرج المحتجز لدى المورّد إلى أصل تشغيلي يملكه العميل."}
        - {title: "بناء قدرة على الابتكار", metric: "↑ 15–25% قدرة على التغيير", detail: "أتح الوقت والميزانية للأتمتة والذكاء الاصطناعي وتغيير Clean Core القابل للتوسع فعلياً."}
      signal_label: "ذكاء اصطناعي عملي"
      signal_detail: "مبني على معرفة تشغيلية قابلة لإعادة الاستخدام حول core نظيف."
  analysis_problem:
    eyebrow: "أين تفقد تغييرات SAP قيمتها"
    title: "المشكلة"
    statement: "الفجوة بين التغيير والتشغيل"
    intro_paragraphs:
      - "ينبغي لتحول SAP أن يخفض التكلفة ويزيد التحكم ويخلق مساحة للابتكار، لا أن يحبس المؤسسة في احتكاك دعم لا ينتهي."
      - "في كثير من بيئات SAP، ما زالت المشاريع وAMS والمعمارية وعمليات الأعمال والموردون تعمل كعوالم منفصلة. المعرفة مجزأة، والتسليم بين الفرق ضعيف، والملكية غير واضحة، ومنطق التكامل مخفي، وفرق الدعم تعيد اكتشاف السياق تحت الضغط."
      - "والنتيجة مكلفة: تغيير بطيء، وعيوب متكررة، واعتماد على المورّد، وإعادة استخدام محدودة للمعرفة، وقدرة ضعيفة على الابتكار الحقيقي. يستمر النظام في العمل، لكن المؤسسة تستمر في دفع كلفة إدارة التعقيد بدلاً من تحسين طريقة عملها."
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "معرفة مجزأة", tone: primary}, {icon: leak_remove, title: "ارتهان للمورّد", tone: neutral}]
    cta: {title: "هل AMS لديك مركز تكلفة أم محفّز؟", detail: "الانتقال من الصيانة التفاعلية إلى توليد القيمة الاستباقي يتطلب معمارية دعم مختلفة، لا مزيداً من التذاكر أو لوحات المعلومات أو الأدوات فقط.", label: "ابدأ تحليل AMS", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "استشارات استراتيجية 2026"
    title: "ينتقل الذكاء الاصطناعي من التجارب إلى التكلفة التشغيلية."
    statement: "سؤال 2026 ليس ما إذا كانت الشركات ستشتري الذكاء الاصطناعي، بل ما إذا كان نموذج التشغيل قادرًا على إثبات القيمة وحوكمة الاستخدام وتجنب طبقة أخرى من تعقيد SAP."
    intro_quote: "لم تعد المخاطرة هي التجريب المجرد. فالذكاء الاصطناعي الوكيلي وCopilots المدمجة وSAP Joule وAI Units والمساعدات المخصصة أصبحت جزءاً من المشهد التجاري والتشغيلي."
    intro_detail: "لذلك تصبح المعمارية وجاهزية البيانات وملكية العمليات وحوكمة الاستخدام جزءاً من مبرر الأعمال. ومن دون هذه الأسس، قد تكدّس فرق SAP مزيداً من قدرات الذكاء الاصطناعي والاشتراكات وديون التكامل من دون تحسين جودة التشغيل."
    mandate: {title: "تكليف 2026", detail: "تعامل مع تبنّي ذكاء SAP الاصطناعي كقرار لنموذج التشغيل، لا كقرار أدوات فقط. ابدأ بسياق عمليات نظيف، ومعرفة دعم، وملكية للتكامل، وحالات استخدام قابلة للقياس، وضوابط لتكلفة الاستهلاك."}
    stats:
      - {label: "مخاطر الذكاء الاصطناعي الوكيلي", value: "40%+", detail: "تتوقع Gartner إلغاء أكثر من 40% من مشاريع الذكاء الاصطناعي الوكيلي بحلول نهاية 2027 عندما تضعف ضوابط التكلفة والقيمة والمخاطر.", source: "المصدر: Gartner", icon: trending_down, tone: light}
      - {label: "بصمة SAP AI", value: "2,500+", detail: "أفادت SAP بأكثر من 2,500 Joule Skills وأكثر من 30 وكيلاً متخصصاً في تحديث Business AI للربع الأول من 2026.", source: "المصدر: SAP", icon: hub, tone: mid}
      - {label: "نطاق الذكاء الاصطناعي المؤسسي", value: "8x", detail: "أفادت OpenAI بنمو سنوي قدره ثمانية أضعاف في حجم رسائل المؤسسات، بما يشير إلى انتقال التبني إلى سير عمل قابل للتكرار.", source: "المصدر: OpenAI", icon: verified, tone: dark}
  strategic_context:
    eyebrow: "السياق الاستراتيجي"
    title: "لماذا يهم ذلك الآن"
    statement: "لم تعد المسألة كفاءة تقنية معلومات فقط؛ بل أصبحت قدرة أعمال."
    hero_cards:
      primary: {label: "أداء السوق", value: "48%", title: "48% فقط من المبادرات الرقمية تحقق أهداف نتائج الأعمال أو تتجاوزها.", source: "المصدر: Gartner", icon: monitoring}
      visual: {quote: "الأساس يحدد الوظيفة. البنية التحتية هي الشريك الصامت للابتكار.", icon: architecture}
      ratio: {label: "فجوة أداء I&O", value: "28%", detail: "البنية التحتية والعمليات: 28% فقط من حالات استخدام الذكاء الاصطناعي تنجح نجاحاً كاملاً."}
      multiplier: {label: "مضاعف النمو", title: "المؤسسات الناجحة في الذكاء الاصطناعي تستثمر", emphasis: "4 أضعاف أكثر", detail: "في الأسس.", icon: hub, tags: ["جودة البيانات", "الحوكمة", "قابلية التوسع"]}
    quote: "يتطلب تغيير SAP الموثوق أساساً تشغيلياً موثوقاً."
    quote_source: "منظور تشغيلي"
  credibility:
    eyebrow: "لماذا يمكن الوثوق بي"
    display_title: "الخلفية المهنية"
    portrait_alt: "صورة Dzmitryi Kharlanau"
    portrait_label: "السياق"
    portrait_value: "بيئة مؤسسية"
    narrative:
      - "أعمل عند تقاطع تحول SAP وAMS والبيانات الرئيسية والذكاء الاصطناعي العملي."
      - "أعمل حالياً Senior SAP Consultant لدى EPAM Systems في بيئات تحول SAP حيث تجتمع إدارة تسليم المشاريع وضغط الدعم وتعقيد التكامل وجودة البيانات والاستقرار التشغيلي."
      - "بدأ مساري في SAP عام 2014 عبر SAP University Alliances وTERP10 وشهادة SAP SD. ومنذ ذلك الحين، شكّلت أكثر من 12 سنة من العمل العملي في دعم SAP واللوجستيات والترحيل والبيانات الرئيسية والتحليل التشغيلي منظوري: أن يعمل تغيير SAP ليس في التصميم فقط، بل بعد go-live والتسليم وفي التشغيل اليومي أيضاً."
      - "الآراء والمواد في هذا الموقع شخصية ومستقلة."
    link_label: "تواصل عبر LinkedIn"
    link_aria_label: "تواصل مع Dzmitryi Kharlanau عبر LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP والعمليات", ai_automation: "الذكاء الاصطناعي والأتمتة", build_delivery: "البناء والتسليم"}
    items:
      - {label: "SAP S/4HANA", summary: "العمل على عمليات SAP الأساسية وتثبيت AMS ودعم الترحيل وقرارات Clean Core."}
      - {label: "SAP MDG", summary: "حوكمة البيانات الرئيسية ووضوح الملكية والضوابط اللازمة لتنفيذ عمليات موثوق."}
      - {label: "OpenAI", summary: "سير عمل LLM وأنماط الاسترجاع لمعرفة الدعم والفرز والتشخيص."}
      - {label: "Google ADK", summary: "تنسيق الوكلاء لسير عمل دعم منظم واستخدام أدوات مضبوط."}
      - {label: "Anthropic", summary: "استدلال وصياغة مطالبات محكومة لعمل الإنتاج الذي تكون فيه السيطرة مهمة."}
      - {label: "AWS", summary: "بيئة تشغيل سحابية لخدمات sidecar والتكاملات والأدوات التشغيلية المعيارية."}
      - {label: "Google Cloud", summary: "بنية الذكاء الاصطناعي وخدمات البيانات لحلول side-by-side."}
      - {label: "Next.js", summary: "واجهات للأدوات الداخلية ولسير العمل المدعوم بالذكاء الاصطناعي الذي يحتاج إلى السرعة والوضوح."}
      - {label: "Python / Data", summary: "الأتمتة والاسترجاع والتحليلات وglue code لتسليم عملي."}
  faq:
    eyebrow: "الحوكمة والاستراتيجية"
    title: "الأسئلة الشائعة"
    lead: "إجابات واضحة عن دعم SAP ومعمارية side-by-side والذكاء الاصطناعي العملي في عمليات المؤسسات."
    items:
      - {question: "هل يمكن تحسين دعم SAP دون استبدال المورّد الحالي؟", answer: "نعم. نقطة البداية المعتادة ليست استبدال المورّد، بل وضوح أكبر في الملكية، وتسليم أفضل بين الفرق، وتشخيص أقوى، وجهد متكرر أقل."}
      - {question: "ما معمارية side-by-side حول SAP؟", answer: "تحافظ على SAP core نظيفاً، وتنقل الأتمتة والتطبيقات الصغيرة وسير العمل المدعوم بالذكاء الاصطناعي إلى خدمات side-by-side أكثر مرونة."}
      - {question: "كيف تقلل الحوادث المتكررة في SAP؟", answer: "بإيجاد النمط المتكرر خلفها: تسليم ضعيف، أو ذاكرة تشغيلية مفقودة، أو ضوابط ضعيفة، أو نقاط تكامل هشة، أو تصميم عملية لم يُحل."}
      - {question: "كيف تستخدم الذكاء الاصطناعي حول SAP من دون مشكلات حوكمة؟", answer: "استخدم الذكاء الاصطناعي بأسلوب side-by-side، واربطه بسياق تشغيلي حقيقي، وسجّل المدخلات والمخرجات المهمة، وأبقِ نقاط التحكم في عمليات الأعمال واضحة."}
      - {question: "كم تستغرق عملية التقييم عادة؟", answer: "عادة من أسبوعين إلى أربعة أسابيع، بحسب تعقيد landscape ونطاق الدعم وسرعة توافر الأشخاص المناسبين والأدلة."}
