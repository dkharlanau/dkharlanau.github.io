content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "Konsulting SAP dla AMS, transformacji i operacji gotowych na AI"
    subtitle: "Od stabilizacji operacyjnej i planowania rozwoju SAP po usprawnienie procesów, governance danych i praktyczne wykorzystanie AI."
    lead: "Pomagam organizacjom stabilizować operacje SAP, planować kolejne etapy rozwoju systemów i procesów, poprawiać jakość danych i integracji oraz przygotowywać zespoły SAP do praktycznych sposobów pracy wspieranych przez AI."
    current_role: "Moja praca łączy SAP AMS, SD/MM, logistykę, dane podstawowe, integracje, architekturę i planowanie delivery. Celem jest nie tylko rozwiązanie bieżących problemów, ale też określenie, co poprawić dalej, dlaczego ma to znaczenie i jak wdrożyć to bezpiecznie."
    perspective: "Dostępne formy współpracy: assessment SAP, roadmapy transformacji, optymalizacja AMS, diagnostyka procesów i danych, planowanie rozwiązania, przeglądy gotowości na AI i ukierunkowane wsparcie wdrożeniowe."
    person_meta: "Konsulting SAP dla operacji, transformacji i gotowości na AI"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "Omów inicjatywę SAP", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}, {label: "Poznaj diagnostykę i zasoby SAP", url: "/atlas/diagnostics/", style: secondary}]}
    visual:
      header_label: "Senior SAP consulting<br>Operacje · transformacja · gotowość na AI"
      title: "Obszary odpowiedzialności"
      items:
        - {title: "Operacje SAP i poprawa AMS", metric: "Stabilizować i usprawniać", detail: "Ograniczać powtarzalne problemy, wyjaśniać odpowiedzialność, wzmacniać diagnostykę i usuwać zbędną pracę ręczną."}
        - {title: "Transformacja SAP i planowanie rozwoju", metric: "Ocenić i nadać priorytety", detail: "Identyfikować możliwości usprawnień i tworzyć praktyczne roadmapy dla procesów i systemów."}
        - {title: "Procesy i dane SAP gotowe na AI", metric: "Przygotować fundamenty", detail: "Poprawiać kontekst procesu, dane podstawowe, interfejsy, wiedzę operacyjną i governance dla kontrolowanych zastosowań AI i automatyzacji."}
        - {title: "Architektura i wsparcie delivery", metric: "Połączyć plan z realizacją", detail: "Łączyć potrzeby biznesu z możliwościami SAP, ograniczeniami, ryzykiem, sekwencją i mierzalnym planem delivery."}
      signal_label: "Rola konsultanta"
      signal_detail: "Łączenie realiów operacyjnych, priorytetów biznesowych, architektury SAP i delivery."
  analysis_problem:
    eyebrow: "Gdzie zmiana SAP traci wartość"
    title: "Problem"
    statement: "Luka między zmianą a eksploatacją"
    intro_paragraphs:
      - "Transformacja SAP powinna obniżać koszty, zwiększać kontrolę i tworzyć przestrzeń dla innowacji — a nie wiązać organizację w niekończących się tarciach wsparcia."
      - "W wielu środowiskach SAP projekty, AMS, architektura, operacje biznesowe i dostawcy nadal działają jak odrębne światy. Wiedza jest rozproszona, przekazanie odpowiedzialności słabe, ownership niejasny, logika integracji ukryta, a zespoły wsparcia odtwarzają kontekst pod presją."
      - "Skutek jest kosztowny: wolne zmiany, powtarzające się defekty, zależność od dostawców, niewielkie ponowne użycie wiedzy i ograniczona zdolność do rzeczywistej innowacji. System nadal działa, lecz organizacja nadal płaci za utrzymanie złożoności zamiast poprawiać sposób działania."
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "Rozproszona wiedza", tone: primary}, {icon: leak_remove, title: "Uzależnienie od dostawcy", tone: neutral}]
    cta: {title: "Czy Twój AMS jest centrum kosztów czy katalizatorem?", detail: "Przejście od reaktywnego utrzymania do proaktywnego tworzenia wartości wymaga innej architektury wsparcia, a nie tylko większej liczby zgłoszeń, dashboardów lub narzędzi.", label: "Rozpocznij analizę AMS", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "Doradztwo strategiczne 2026"
    title: "AI przechodzi od pilotaży do kosztu operacyjnego."
    statement: "Pytanie na 2026 rok nie brzmi, czy przedsiębiorstwa kupią AI. Chodzi o to, czy model operacyjny potrafi udowodnić wartość, zarządzać użyciem i uniknąć kolejnej warstwy złożoności SAP."
    intro_quote: "Ryzykiem nie są już abstrakcyjne eksperymenty. Agentic AI, wbudowane copilots, SAP Joule, AI Units i niestandardowi asystenci stają się częścią krajobrazu komercyjnego i operacyjnego."
    intro_detail: "Dlatego architektura, gotowość danych, odpowiedzialność za proces i governance użycia stają się elementami business case. Bez tych fundamentów zespoły SAP mogą gromadzić kolejne funkcje AI, subskrypcje i dług integracyjny, nie poprawiając jakości eksploatacji."
    mandate: {title: "Priorytet na 2026", detail: "Traktuj wdrożenie AI w SAP jako decyzję o modelu operacyjnym, nie tylko o narzędziu. Zacznij od czystego kontekstu procesowego, wiedzy wsparcia, ownership integracji, mierzalnych przypadków użycia i barier dla kosztów opartych na zużyciu."}
    stats:
      - {label: "Ryzyko agentic AI", value: "40%+", detail: "Gartner przewiduje, że do końca 2027 roku ponad 40% projektów agentic AI zostanie anulowanych, gdy kontrola kosztów, wartości i ryzyka jest słaba.", source: "Źródło: Gartner", icon: trending_down, tone: light}
      - {label: "Skala AI w SAP", value: "2 500+", detail: "SAP podał ponad 2 500 Joule Skills i ponad 30 wyspecjalizowanych agentów w aktualizacji Business AI za I kwartał 2026.", source: "Źródło: SAP", icon: hub, tone: mid}
      - {label: "Skala AI w przedsiębiorstwach", value: "8x", detail: "OpenAI podało ośmiokrotny wzrost rok do roku wolumenu wiadomości enterprise, co pokazuje przejście do powtarzalnych workflow.", source: "Źródło: OpenAI", icon: verified, tone: dark}
  strategic_context:
    eyebrow: "Kontekst strategiczny"
    title: "Dlaczego ma to znaczenie teraz"
    statement: "To nie jest już wyłącznie kwestia efektywności IT. To kwestia zdolności biznesowej."
    hero_cards:
      primary: {label: "Wyniki rynkowe", value: "48%", title: "Tylko 48% inicjatyw cyfrowych osiąga lub przekracza docelowe wyniki biznesowe.", source: "Źródło: Gartner", icon: monitoring}
      visual: {quote: "Fundament determinuje funkcję. Infrastruktura jest cichym partnerem innowacji.", icon: architecture}
      ratio: {label: "Luka wydajności I&O", value: "28%", detail: "Infrastruktura i operacje: tylko 28% przypadków użycia AI kończy się pełnym sukcesem."}
      multiplier: {label: "Mnożnik wzrostu", title: "Organizacje skuteczne w AI inwestują", emphasis: "4x więcej", detail: "w fundamenty.", icon: hub, tags: ["Jakość danych", "Governance", "Skalowalność"]}
    quote: "Wiarygodna zmiana SAP wymaga wiarygodnego fundamentu operacyjnego."
    quote_source: "Perspektywa operacyjna"
  credibility:
    eyebrow: "Dlaczego warto mi zaufać"
    display_title: "Doświadczenie zawodowe"
    portrait_alt: "Portret Dzmitryiego Kharlanau"
    portrait_label: "Kontekst"
    portrait_value: "Środowisko enterprise"
    narrative:
      - "Pracuję na styku transformacji SAP, AMS, danych podstawowych i praktycznego AI."
      - "Obecnie jestem Senior SAP Consultant w EPAM Systems i pracuję w środowiskach transformacji SAP, w których spotykają się delivery projektowe, presja wsparcia, złożoność integracji, jakość danych i stabilność operacyjna."
      - "Moja ścieżka SAP zaczęła się w 2014 roku od SAP University Alliances, TERP10 i certyfikacji SAP SD. Od tego czasu ponad 12 lat praktycznej pracy ze wsparciem SAP, logistyką, migracją, danymi podstawowymi i analizą operacyjną ukształtowało moją perspektywę: zmiana SAP musi działać nie tylko w projekcie, ale również po go-live, przekazaniu i w codziennej eksploatacji."
      - "Poglądy i materiały na tej stronie są osobiste i niezależne."
    link_label: "Kontakt przez LinkedIn"
    link_aria_label: "Skontaktuj się z Dzmitryim Kharlanau na LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP i procesy", ai_automation: "AI i automatyzacja", build_delivery: "Budowa i delivery"}
    items:
      - {label: "SAP S/4HANA", summary: "Praca z procesami SAP core, stabilizacja AMS, wsparcie migracji i decyzje Clean Core."}
      - {label: "SAP MDG", summary: "Governance danych podstawowych, jasny ownership i kontrole dla niezawodnego wykonania procesów."}
      - {label: "OpenAI", summary: "Workflow LLM i wzorce retrieval dla wiedzy wsparcia, triage i diagnostyki."}
      - {label: "Google ADK", summary: "Orkiestracja agentów dla ustrukturyzowanych workflow wsparcia i kontrolowanego użycia narzędzi."}
      - {label: "Anthropic", summary: "Reasoning i zarządzane prompting dla pracy produkcyjnej, gdzie kontrola ma znaczenie."}
      - {label: "AWS", summary: "Runtime chmurowy dla usług sidecar, integracji i modułowych narzędzi operacyjnych."}
      - {label: "Google Cloud", summary: "Infrastruktura AI i usługi danych dla rozwiązań side-by-side."}
      - {label: "Next.js", summary: "Interfejsy dla narzędzi wewnętrznych i workflow wspieranych przez AI, które wymagają szybkości i przejrzystości."}
      - {label: "Python / Data", summary: "Automatyzacja, retrieval, analityka i glue code dla praktycznego delivery."}
  faq:
    eyebrow: "Governance i strategia"
    title: "Najczęściej zadawane pytania"
    lead: "Jasne odpowiedzi na temat wsparcia SAP, architektury side-by-side i praktycznego AI w operacjach enterprise."
    items:
      - {question: "Czy możesz usprawnić wsparcie SAP bez zmiany obecnego dostawcy?", answer: "Tak. Zwykle punktem wyjścia nie jest wymiana dostawcy, lecz jaśniejszy ownership, lepsze przekazanie, silniejsza diagnostyka i mniej powtarzalnej pracy."}
      - {question: "Czym jest architektura side-by-side wokół SAP?", answer: "Utrzymuje SAP core w czystości, przenosząc automatyzację, miniaplikacje i workflow wspierane przez AI do bardziej elastycznych usług side-by-side."}
      - {question: "Jak ograniczać powtarzające się incydenty SAP?", answer: "Przez znalezienie powtarzalnego wzorca: słabego przekazania, brakującej pamięci operacyjnej, niewystarczających kontroli, kruchych punktów integracji lub nierozwiązanego projektu procesu."}
      - {question: "Jak używać AI wokół SAP bez problemów z governance?", answer: "Używaj AI side-by-side, opieraj ją na realnym kontekście operacyjnym, zapisuj istotne wejścia i wyjścia oraz utrzymuj widoczność punktów kontrolnych procesu biznesowego."}
      - {question: "Ile trwa typowa ocena?", answer: "Zwykle od dwóch do czterech tygodni, zależnie od złożoności landscape, zakresu wsparcia i szybkości dostępu do właściwych osób oraz dowodów."}
