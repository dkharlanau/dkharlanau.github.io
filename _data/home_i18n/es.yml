content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "Consultoría SAP para AMS, transformación y operaciones preparadas para IA"
    subtitle: "Desde la estabilización operativa y la planificación del desarrollo SAP hasta la mejora de procesos, el gobierno de datos y la habilitación práctica de IA."
    lead: "Ayudo a las organizaciones a estabilizar sus operaciones SAP, planificar las siguientes etapas de desarrollo de sistemas y procesos, mejorar la calidad de datos e integraciones y preparar a los equipos SAP para formas de trabajo prácticas habilitadas por IA."
    current_role: "Mi trabajo conecta SAP AMS, SD/MM, logística, datos maestros, integraciones, arquitectura y planificación de delivery. El objetivo no es solo resolver problemas actuales, sino definir qué debe mejorarse después, por qué importa y cómo implementarlo con seguridad."
    perspective: "Disponible para assessments SAP, hojas de ruta de transformación, optimización de AMS, diagnósticos de procesos y datos, planificación de soluciones, revisiones de preparación para IA y apoyo focalizado a la implementación."
    person_meta: "Consultoría SAP para operaciones, transformación y preparación para IA"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "Hablar sobre una iniciativa SAP", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}, {label: "Explorar diagnósticos y recursos SAP", url: "/atlas/diagnostics/", style: secondary}]}
    visual:
      header_label: "Senior SAP consulting<br>Operaciones · transformación · preparación para IA"
      title: "Áreas de responsabilidad"
      items:
        - {title: "Operaciones SAP y mejora de AMS", metric: "Estabilizar y mejorar", detail: "Reducir problemas recurrentes, aclarar responsabilidades, reforzar el diagnóstico y eliminar trabajo manual innecesario."}
        - {title: "Transformación SAP y planificación del desarrollo", metric: "Evaluar y priorizar", detail: "Identificar oportunidades de mejora y crear hojas de ruta prácticas para procesos y sistemas."}
        - {title: "Procesos y datos SAP preparados para IA", metric: "Preparar las bases", detail: "Mejorar el contexto de procesos, datos maestros, interfaces, conocimiento operativo y gobierno para casos de uso controlados de IA y automatización."}
        - {title: "Arquitectura y guía de delivery", metric: "Conectar plan y ejecución", detail: "Conectar necesidades de negocio con capacidades SAP, restricciones de solución, riesgos, secuenciación y planes de delivery medibles."}
      signal_label: "Rol de consultoría"
      signal_detail: "Conectar la realidad operativa, las prioridades de negocio, la arquitectura SAP y el delivery."
  analysis_problem:
    eyebrow: "Dónde el cambio SAP pierde valor"
    title: "El problema"
    statement: "La brecha entre cambio y operación"
    intro_paragraphs:
      - "La transformación SAP debe reducir costes, aumentar el control y crear espacio para la innovación, no atar a la organización a una fricción de soporte interminable."
      - "En muchos entornos SAP, proyectos, AMS, arquitectura, operaciones de negocio y proveedores siguen funcionando como mundos separados. El conocimiento está fragmentado, el traspaso es débil, la propiedad es difusa, la lógica de integración queda oculta y los equipos de soporte redescubren el contexto bajo presión."
      - "El resultado es costoso: cambio lento, defectos repetidos, dependencia de proveedores, poco reaprovechamiento del conocimiento y capacidad limitada para innovar de verdad. El sistema sigue funcionando, pero la organización sigue pagando por mantener la complejidad en vez de mejorar su operación."
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "Conocimiento fragmentado", tone: primary}, {icon: leak_remove, title: "Dependencia del proveedor", tone: neutral}]
    cta: {title: "¿Su AMS es un centro de coste o un catalizador?", detail: "Pasar del mantenimiento reactivo a la generación proactiva de valor exige otra arquitectura de soporte, no solo más tickets, paneles o herramientas.", label: "Iniciar análisis AMS", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "Asesoramiento estratégico 2026"
    title: "La IA pasa de pilotos a coste operativo."
    statement: "La pregunta de 2026 no es si las empresas comprarán IA, sino si el modelo operativo puede demostrar valor, gobernar el uso y evitar otra capa de complejidad SAP."
    intro_quote: "El riesgo ya no es la experimentación abstracta. La IA agéntica, los copilotos embebidos, SAP Joule, AI Units y los asistentes a medida se están convirtiendo en parte del panorama comercial y operativo."
    intro_detail: "Por ello, arquitectura, preparación de datos, propiedad de procesos y gobierno del uso pasan a formar parte del caso de negocio. Sin esas bases, los equipos SAP pueden acumular más funciones de IA, suscripciones y deuda de integración sin mejorar la calidad operativa."
    mandate: {title: "Mandato 2026", detail: "Trate la adopción de IA en SAP como una decisión de modelo operativo, no solo de herramientas. Empiece con contexto de proceso limpio, conocimiento de soporte, propiedad de integración, casos de uso medibles y salvaguardas para costes basados en consumo."}
    stats:
      - {label: "Riesgo de IA agéntica", value: "40%+", detail: "Gartner prevé que más del 40 % de los proyectos de IA agéntica se cancelen antes de finales de 2027 cuando los controles de coste, valor y riesgo son débiles.", source: "Fuente: Gartner", icon: trending_down, tone: light}
      - {label: "Huella de IA SAP", value: "2.500+", detail: "SAP informó de más de 2.500 Joule Skills y más de 30 agentes especializados en su actualización Business AI del primer trimestre de 2026.", source: "Fuente: SAP", icon: hub, tone: mid}
      - {label: "Escala de IA empresarial", value: "8x", detail: "OpenAI comunicó un crecimiento interanual de ocho veces en el volumen de mensajes empresariales, señal de que la adopción se está consolidando en flujos repetibles.", source: "Fuente: OpenAI", icon: verified, tone: dark}
  strategic_context:
    eyebrow: "Contexto estratégico"
    title: "Por qué importa ahora"
    statement: "Ya no es solo una cuestión de eficiencia de TI. Es una cuestión de capacidad de negocio."
    hero_cards:
      primary: {label: "Rendimiento de mercado", value: "48%", title: "Solo el 48 % de las iniciativas digitales alcanza o supera los objetivos de resultados de negocio.", source: "Fuente: Gartner", icon: monitoring}
      visual: {quote: "La base determina la función. La infraestructura es el socio silencioso de la innovación.", icon: architecture}
      ratio: {label: "Brecha de rendimiento de I&O", value: "28%", detail: "Infraestructura y operaciones: solo el 28 % de los casos de uso de IA tiene éxito total."}
      multiplier: {label: "El multiplicador de crecimiento", title: "Las organizaciones con éxito en IA invierten", emphasis: "4x más", detail: "en fundamentos.", icon: hub, tags: ["Calidad de datos", "Gobierno", "Escalabilidad"]}
    quote: "El cambio SAP fiable necesita una base operativa fiable."
    quote_source: "Perspectiva operativa"
  credibility:
    eyebrow: "Por qué confiar en mí"
    display_title: "Trayectoria profesional"
    portrait_alt: "Retrato de Dzmitryi Kharlanau"
    portrait_label: "Contexto"
    portrait_value: "Entorno empresarial"
    narrative:
      - "Trabajo en la intersección de la transformación SAP, AMS, datos maestros e IA práctica."
      - "Actualmente soy Senior SAP Consultant en EPAM Systems, en entornos de transformación SAP donde coinciden la entrega de proyectos, la presión de soporte, la complejidad de integración, la calidad de datos y la estabilidad operativa."
      - "Mi trayectoria SAP comenzó en 2014 con SAP University Alliances, TERP10 y la certificación SAP SD. Desde entonces, más de 12 años de trabajo práctico en soporte SAP, logística, migración, datos maestros y análisis operativo han definido mi perspectiva: hacer que el cambio SAP funcione no solo en el diseño, sino después del go-live, el traspaso y en la operación diaria."
      - "Las opiniones y materiales de este sitio son personales e independientes."
    link_label: "Contactar por LinkedIn"
    link_aria_label: "Contactar con Dzmitryi Kharlanau en LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP y procesos", ai_automation: "IA y automatización", build_delivery: "Construcción y entrega"}
    items:
      - {label: "SAP S/4HANA", summary: "Trabajo en procesos SAP core, estabilización AMS, apoyo a migraciones y decisiones Clean Core."}
      - {label: "SAP MDG", summary: "Gobierno de datos maestros, claridad de propiedad y controles para una ejecución fiable de procesos."}
      - {label: "OpenAI", summary: "Flujos LLM y patrones de retrieval para conocimiento de soporte, triaje y diagnóstico."}
      - {label: "Google ADK", summary: "Orquestación de agentes para flujos de soporte estructurados y uso controlado de herramientas."}
      - {label: "Anthropic", summary: "Razonamiento y prompting gobernado para trabajo productivo donde el control importa."}
      - {label: "AWS", summary: "Runtime cloud para servicios sidecar, integraciones y herramientas operativas modulares."}
      - {label: "Google Cloud", summary: "Infraestructura de IA y servicios de datos para soluciones side-by-side."}
      - {label: "Next.js", summary: "Interfaces para herramientas internas y flujos habilitados por IA que requieren velocidad y claridad."}
      - {label: "Python / Data", summary: "Automatización, retrieval, analítica y código de integración para una entrega práctica."}
  faq:
    eyebrow: "Gobierno y estrategia"
    title: "Preguntas frecuentes"
    lead: "Respuestas claras sobre soporte SAP, arquitectura side-by-side e IA práctica en operaciones empresariales."
    items:
      - {question: "¿Puede mejorar el soporte SAP sin sustituir al proveedor actual?", answer: "Sí. El punto de partida habitual no es sustituir al proveedor, sino aclarar responsabilidades, reforzar el traspaso, mejorar el diagnóstico y reducir el esfuerzo repetido."}
      - {question: "¿Qué es la arquitectura side-by-side alrededor de SAP?", answer: "Mantiene limpio el core de SAP y traslada automatización, miniaplicaciones y flujos habilitados por IA a servicios side-by-side más flexibles."}
      - {question: "¿Cómo se reducen las incidencias SAP recurrentes?", answer: "Encontrando el patrón repetido: traspaso débil, memoria operativa ausente, controles deficientes, puntos de integración frágiles o diseño de proceso sin resolver."}
      - {question: "¿Cómo utiliza IA alrededor de SAP sin problemas de gobierno?", answer: "Use IA side-by-side, apóyela en contexto operativo real, registre las entradas y salidas importantes y mantenga visibles los puntos de control del proceso de negocio."}
      - {question: "¿Cuánto dura una evaluación habitual?", answer: "Normalmente de dos a cuatro semanas, según la complejidad del landscape, el alcance de soporte y la disponibilidad de las personas y evidencias adecuadas."}
