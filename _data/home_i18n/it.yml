content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "SAP AMS, automazione del supporto con IA e ottimizzazione dei processi"
    subtitle: "Lavoro su supporto SAP AMS, analisi degli incidenti, temi SD/MM, problemi di dati master e workflow assistiti dall’IA che aiutano i team di supporto a ridurre il lavoro ripetitivo e a migliorare la conoscenza operativa."
    current_role: 'Basato su esperienza SAP pratica in supporto, logistica, dati master, migrazione e analisi operativa — attualmente Senior SAP Consultant presso <a href="https://www.epam.com" target="_blank" rel="noopener noreferrer">EPAM Systems</a>.'
    person_meta: "Consulenza SAP AMS e automazione del supporto"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "Connettiti su LinkedIn", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}]}
    visual:
      header_label: "TCO più basso $ ↓<br>Meno dipendenza<br>Più innovazione ↑"
      title: "Ciclo di valore operativo"
      items: [{title: "Ridurre il costo operativo", metric: "↓ 10–20% di overhead di delivery", detail: "Ridurre analisi ripetute, sforzo di supporto ricorrente e coordinamento evitabile."}, {title: "Ridurre la dipendenza", metric: "↑ 20–40% di conoscenza riutilizzabile", detail: "Trasformare il contesto critico detenuto dal fornitore in un asset operativo del cliente."}, {title: "Creare capacità di innovazione", metric: "↑ 15–25% di capacità di cambiamento", detail: "Liberare tempo e budget per automazione, IA e cambiamenti Clean Core realmente scalabili."}]
      signal_label: "IA pratica"
      signal_detail: "Costruita su conoscenza operativa riutilizzabile attorno a un core pulito."
  analysis_problem:
    eyebrow: "Dove il cambiamento SAP perde valore"
    title: "Il problema"
    statement: "Il divario tra cambiamento e gestione"
    intro_paragraphs: ["La trasformazione SAP dovrebbe ridurre i costi, aumentare il controllo e creare spazio per l’innovazione — non vincolare l’organizzazione a un’attrito di supporto senza fine.", "In molti ambienti SAP, progetti, AMS, architettura, operations di business e fornitori lavorano ancora come mondi separati. La conoscenza è frammentata, l’handover è debole, la responsabilità è sfocata, la logica di integrazione è nascosta e i team di supporto riscoprono il contesto sotto pressione.", "Il risultato è costoso: cambiamento lento, difetti ricorrenti, dipendenza dal fornitore, scarso riuso della conoscenza e capacità limitata per l’innovazione reale. Il sistema continua a funzionare, ma l’organizzazione continua a pagare per mantenere la complessità anziché migliorare il proprio modo di operare."]
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "Conoscenza frammentata", tone: primary}, {icon: leak_remove, title: "Lock-in del fornitore", tone: neutral}]
    cta: {title: "Il vostro AMS è un centro di costo o un catalizzatore?", detail: "Passare dalla manutenzione reattiva alla creazione proattiva di valore richiede un’altra architettura di supporto, non soltanto più ticket, dashboard o strumenti.", label: "Avvia analisi AMS", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "Consulenza strategica 2026"
    title: "L’IA passa dai pilot al costo operativo."
    statement: "La domanda del 2026 non è se le imprese acquisteranno IA, ma se il modello operativo può dimostrare valore, governare l’uso ed evitare un ulteriore strato di complessità SAP."
    intro_quote: "Il rischio non è più la sperimentazione astratta. IA agentica, copilot incorporati, SAP Joule, AI Units e assistenti personalizzati stanno entrando nel panorama commerciale e operativo."
    intro_detail: "Architettura, preparazione dei dati, responsabilità di processo e governance d’uso diventano quindi parte del business case. Senza queste basi, i team SAP possono accumulare funzionalità IA, abbonamenti e debito di integrazione senza migliorare la qualità operativa."
    mandate: {title: "Mandato 2026", detail: "Trattate l’adozione dell’IA SAP come una decisione sul modello operativo, non solo sugli strumenti. Partite da contesto di processo pulito, conoscenza di supporto, ownership dell’integrazione, casi d’uso misurabili e guardrail per i costi a consumo."}
    stats: [{label: "Rischio IA agentica", value: "40%+", detail: "Gartner prevede che oltre il 40% dei progetti di IA agentica sarà annullato entro fine 2027 quando i controlli su costo, valore e rischio sono deboli.", source: "Fonte: Gartner", icon: trending_down, tone: light}, {label: "Presenza IA SAP", value: "2.500+", detail: "SAP ha comunicato oltre 2.500 Joule Skills e più di 30 agenti specializzati nel suo aggiornamento Business AI Q1 2026.", source: "Fonte: SAP", icon: hub, tone: mid}, {label: "Scala dell’IA enterprise", value: "8x", detail: "OpenAI ha comunicato una crescita annua di otto volte nel volume di messaggi enterprise, segno di adozione in workflow ripetibili.", source: "Fonte: OpenAI", icon: verified, tone: dark}]
  strategic_context:
    eyebrow: "Contesto strategico"
    title: "Perché è importante ora"
    statement: "Non è più solo un tema di efficienza IT. È una capacità di business."
    hero_cards:
      primary: {label: "Performance di mercato", value: "48%", title: "Solo il 48% delle iniziative digitali raggiunge o supera gli obiettivi di risultato di business.", source: "Fonte: Gartner", icon: monitoring}
      visual: {quote: "La base determina la funzione. L’infrastruttura è il partner silenzioso dell’innovazione.", icon: architecture}
      ratio: {label: "Divario di performance I&O", value: "28%", detail: "Infrastruttura e operations: solo il 28% dei casi d’uso IA ha pieno successo."}
      multiplier: {label: "Il moltiplicatore di crescita", title: "Le organizzazioni che riescono con l’IA investono", emphasis: "4x di più", detail: "nelle fondamenta.", icon: hub, tags: ["Qualità dei dati", "Governance", "Scalabilità"]}
    quote: "Un cambiamento SAP affidabile richiede una base operativa affidabile."
    quote_source: "Prospettiva operativa"
  credibility:
    eyebrow: "Perché fidarsi di me"
    display_title: "Profilo professionale"
    portrait_alt: "Ritratto di Dzmitryi Kharlanau"
    portrait_label: "Contesto"
    portrait_value: "Ambiente enterprise"
    narrative: ["Lavoro all’intersezione tra trasformazione SAP, AMS, dati master e IA pratica.", "Sono attualmente Senior SAP Consultant presso EPAM Systems, in contesti di trasformazione SAP dove delivery di progetto, pressione del supporto, complessità di integrazione, qualità dei dati e stabilità operativa si incontrano.", "Il mio percorso SAP è iniziato nel 2014 con SAP University Alliances, TERP10 e la certificazione SAP SD. Da allora, oltre 12 anni di lavoro pratico in supporto SAP, logistica, migrazione, dati master e analisi operativa hanno formato la mia prospettiva: far funzionare il cambiamento SAP non solo nel design, ma anche dopo go-live, handover e nelle operazioni quotidiane.", "Le opinioni e i materiali di questo sito sono personali e indipendenti."]
    link_label: "Contatta su LinkedIn"
    link_aria_label: "Contatta Dzmitryi Kharlanau su LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP e processi", ai_automation: "IA e automazione", build_delivery: "Sviluppo e delivery"}
    items: [{label: "SAP S/4HANA", summary: "Lavoro sui processi SAP core, stabilizzazione AMS, supporto alla migrazione e decisioni Clean Core."}, {label: "SAP MDG", summary: "Governance dei dati master, chiarezza di ownership e controlli per un’esecuzione affidabile dei processi."}, {label: "OpenAI", summary: "Workflow LLM e pattern di retrieval per conoscenza di supporto, triage e diagnostica."}, {label: "Google ADK", summary: "Orchestrazione di agenti per workflow di supporto strutturati e uso controllato degli strumenti."}, {label: "Anthropic", summary: "Reasoning e prompting governato per il lavoro di produzione dove il controllo conta."}, {label: "AWS", summary: "Runtime cloud per servizi sidecar, integrazioni e strumenti operativi modulari."}, {label: "Google Cloud", summary: "Infrastruttura IA e servizi dati per soluzioni side-by-side."}, {label: "Next.js", summary: "Interfacce per strumenti interni e workflow abilitati dall’IA che richiedono velocità e chiarezza."}, {label: "Python / Data", summary: "Automazione, retrieval, analisi e glue code per delivery pratico."}]
  faq:
    eyebrow: "Governance e strategia"
    title: "Domande frequenti"
    lead: "Risposte chiare su supporto SAP, architettura side-by-side e IA pratica nelle operations enterprise."
    items: [{question: "Potete migliorare il supporto SAP senza sostituire il fornitore attuale?", answer: "Sì. Il punto di partenza abituale non è sostituire il fornitore, ma chiarire le responsabilità, rafforzare l’handover, migliorare la diagnostica e ridurre l’effort ripetuto."}, {question: "Che cos’è un’architettura side-by-side intorno a SAP?", answer: "Mantiene pulito il core SAP spostando automazione, mini app e workflow abilitati dall’IA in servizi side-by-side più flessibili."}, {question: "Come si riducono gli incidenti SAP ricorrenti?", answer: "Individuando il pattern ripetuto: handover debole, memoria operativa mancante, controlli scarsi, punti di integrazione fragili o process design irrisolto."}, {question: "Come usate l’IA intorno a SAP senza problemi di governance?", answer: "Usate l’IA side-by-side, basatela sul contesto operativo reale, registrate input e output importanti e mantenete visibili i punti di controllo del processo di business."}, {question: "Quanto dura una valutazione tipica?", answer: "Di norma da due a quattro settimane, in base alla complessità del landscape, all’ambito del supporto e alla disponibilità delle persone e delle evidenze giuste."}]
