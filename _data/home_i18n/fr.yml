content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "Conseil SAP pour l’AMS, la transformation et des opérations prêtes pour l’IA"
    subtitle: "De la stabilisation opérationnelle et la planification des évolutions SAP à l’amélioration des processus, la gouvernance des données et l’activation pragmatique de l’IA."
    lead: "J’aide les organisations à stabiliser leurs opérations SAP, planifier les prochaines étapes d’évolution des systèmes et des processus, améliorer la qualité des données et des intégrations et préparer les équipes SAP à des modes de travail concrets, assistés par l’IA."
    current_role: "Mon travail relie SAP AMS, SD/MM, logistique, données de référence, intégrations, architecture et planification du delivery. Il ne s’agit pas seulement de résoudre les difficultés actuelles, mais aussi de définir ce qui doit être amélioré ensuite, pourquoi cela compte et comment le mettre en œuvre de façon sûre."
    perspective: "Interventions possibles : assessments SAP, feuilles de route de transformation, optimisation AMS, diagnostics de processus et de données, planification de solutions, revues de préparation à l’IA et soutien ciblé à l’implémentation."
    person_meta: "Conseil SAP pour les opérations, la transformation et la préparation à l’IA"
    profile:
      image: "/assets/img/DzmitryiKharlanau.png"
      image_webp: "/assets/img/DzmitryiKharlanau.webp"
      image_avif: "/assets/img/DzmitryiKharlanau.avif"
      alt: "Dzmitryi Kharlanau"
      contacts: [{label: "Discuter d’une initiative SAP", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}, {label: "Explorer les diagnostics et ressources SAP", url: "/atlas/diagnostics/", style: secondary}]
    visual:
      header_label: "Senior SAP consulting<br>Opérations · transformation · préparation à l’IA"
      title: "Domaines de responsabilité"
      items:
        - {title: "Opérations SAP et amélioration de l’AMS", metric: "Stabiliser et améliorer", detail: "Réduire les problèmes récurrents, clarifier les responsabilités, renforcer le diagnostic et limiter le travail manuel inutile."}
        - {title: "Transformation SAP et planification des évolutions", metric: "Évaluer et prioriser", detail: "Identifier les opportunités d’amélioration et créer des feuilles de route concrètes pour les processus et les systèmes."}
        - {title: "Processus et données SAP prêts pour l’IA", metric: "Préparer les fondations", detail: "Améliorer le contexte des processus, les données de référence, les interfaces, la connaissance opérationnelle et la gouvernance pour des usages contrôlés de l’IA et de l’automatisation."}
        - {title: "Architecture et pilotage du delivery", metric: "Relier plan et exécution", detail: "Relier les besoins métier aux capacités SAP, aux contraintes de solution, aux risques, au séquencement et à des plans de delivery mesurables."}
      signal_label: "Rôle de conseil"
      signal_detail: "Relier la réalité opérationnelle, les priorités métier, l’architecture SAP et le delivery."
  analysis_problem:
    eyebrow: "Là où le changement SAP perd de la valeur"
    title: "Le problème"
    statement: "L’écart entre changement et exploitation"
    intro_paragraphs:
      - "Une transformation SAP doit réduire les coûts, renforcer la maîtrise et créer de l’espace pour l’innovation — pas enfermer l’organisation dans une friction de support sans fin."
      - "Dans de nombreux environnements SAP, projets, AMS, architecture, métiers et fournisseurs fonctionnent encore séparément. La connaissance est fragmentée, les passations faibles, les responsabilités floues, la logique d’intégration cachée, et les équipes support redécouvrent le contexte sous pression."
      - "Le coût est élevé : changement lent, défauts répétés, dépendance fournisseur, faible réutilisation de la connaissance et capacité limitée pour l’innovation réelle. Le système continue de fonctionner, mais l’organisation continue de payer pour entretenir la complexité au lieu d’améliorer son fonctionnement."
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "Connaissance fragmentée", tone: primary}, {icon: leak_remove, title: "Verrouillage fournisseur", tone: neutral}]
    cta: {title: "Votre AMS est-il un centre de coût ou un catalyseur ?", detail: "Passer de la maintenance réactive à une création de valeur proactive exige une autre architecture de support, pas seulement plus de tickets, de tableaux de bord ou d’outils.", label: "Démarrer l’analyse AMS", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "Conseil stratégique 2026"
    title: "L’IA passe des pilotes au coût d’exploitation."
    statement: "En 2026, la question n’est pas de savoir si les entreprises achèteront de l’IA, mais si leur modèle opérationnel peut prouver la valeur, gouverner l’usage et éviter une couche supplémentaire de complexité SAP."
    intro_quote: "Le risque n’est plus l’expérimentation abstraite. IA agentique, copilots embarqués, SAP Joule, AI Units et assistants sur mesure font désormais partie du paysage commercial et opérationnel."
    intro_detail: "L’architecture, la maturité des données, la responsabilité des processus et la gouvernance d’usage deviennent donc des éléments du business case. Sans ces bases, les équipes SAP peuvent accumuler fonctionnalités IA, abonnements et dette d’intégration sans améliorer la qualité d’exploitation."
    mandate: {title: "Mandat 2026", detail: "Traiter l’adoption de l’IA SAP comme une décision de modèle opérationnel, et non seulement d’outillage. Partir d’un contexte de processus propre, de connaissances support, d’une responsabilité d’intégration, de cas d’usage mesurables et de garde-fous pour les coûts à la consommation."}
    stats:
      - {label: "Risque IA agentique", value: "40%+", detail: "Gartner prévoit que plus de 40 % des projets d’IA agentique seront annulés d’ici fin 2027 lorsque les contrôles de coût, de valeur et de risque sont faibles.", source: "Source : Gartner", icon: trending_down, tone: light}
      - {label: "Empreinte IA SAP", value: "2 500+", detail: "SAP a annoncé plus de 2 500 Joule Skills et plus de 30 agents spécialisés dans sa mise à jour Business AI du T1 2026.", source: "Source : SAP", icon: hub, tone: mid}
      - {label: "Passage à l’échelle de l’IA d’entreprise", value: "8x", detail: "OpenAI a signalé une croissance annuelle de huit fois du volume de messages en entreprise, signe que l’adoption entre dans des workflows répétables.", source: "Source : OpenAI", icon: verified, tone: dark}
  strategic_context:
    eyebrow: "Contexte stratégique"
    title: "Pourquoi c’est important maintenant"
    statement: "Ce n’est plus seulement un sujet d’efficacité IT. C’est un sujet de capacité métier."
    hero_cards:
      primary: {label: "Performance de marché", value: "48%", title: "Seules 48 % des initiatives numériques atteignent ou dépassent leurs objectifs de résultats métier.", source: "Source : Gartner", icon: monitoring}
      visual: {quote: "Le socle détermine la fonction. L’infrastructure est le partenaire discret de l’innovation.", icon: architecture}
      ratio: {label: "Écart de performance I&O", value: "28%", detail: "Infrastructure et opérations : seuls 28 % des cas d’usage IA réussissent pleinement."}
      multiplier: {label: "Le multiplicateur de croissance", title: "Les organisations qui réussissent avec l’IA investissent", emphasis: "4x plus", detail: "dans les fondations.", icon: hub, tags: ["Qualité des données", "Gouvernance", "Scalabilité"]}
    quote: "Un changement SAP fiable commence par une base opérationnelle fiable."
    quote_source: "Perspective opérationnelle"
  credibility:
    eyebrow: "Pourquoi me faire confiance"
    display_title: "Parcours professionnel"
    portrait_alt: "Portrait de Dzmitryi Kharlanau"
    portrait_label: "Contexte"
    portrait_value: "Environnement d’entreprise"
    narrative:
      - "Je travaille à l’intersection de la transformation SAP, de l’AMS, des données de référence et de l’IA pragmatique."
      - "Je suis actuellement Senior SAP Consultant chez EPAM Systems, dans des environnements de transformation SAP où se rencontrent delivery projet, pression du support, complexité d’intégration, qualité des données et stabilité opérationnelle."
      - "Mon parcours SAP a commencé en 2014 avec SAP University Alliances, TERP10 et la certification SAP SD. Depuis, plus de 12 ans de pratique du support SAP, de la logistique, de la migration, des données de référence et de l’analyse opérationnelle façonnent ma perspective — afin que le changement SAP fonctionne dans la conception comme après le go-live, la passation et les opérations quotidiennes."
      - "Les points de vue et contenus de ce site sont personnels et indépendants."
    link_label: "Contacter sur LinkedIn"
    link_aria_label: "Contacter Dzmitryi Kharlanau sur LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP et processus", ai_automation: "IA et automatisation", build_delivery: "Construction et delivery"}
    items:
      - {label: "SAP S/4HANA", summary: "Travail sur les processus SAP centraux, stabilisation AMS, support à la migration et décisions Clean Core."}
      - {label: "SAP MDG", summary: "Gouvernance des données de référence, responsabilités claires et contrôles pour une exécution fiable des processus."}
      - {label: "OpenAI", summary: "Workflows LLM et modèles de retrieval pour la connaissance support, le triage et le diagnostic."}
      - {label: "Google ADK", summary: "Orchestration d’agents pour des workflows support structurés et un usage contrôlé des outils."}
      - {label: "Anthropic", summary: "Raisonnement et prompting gouverné pour les usages de production où le contrôle est essentiel."}
      - {label: "AWS", summary: "Runtime cloud pour services sidecar, intégrations et outils opérationnels modulaires."}
      - {label: "Google Cloud", summary: "Infrastructure IA et services de données pour des solutions side-by-side."}
      - {label: "Next.js", summary: "Interfaces pour outils internes et workflows activés par l’IA qui exigent rapidité et clarté."}
      - {label: "Python / Data", summary: "Automatisation, retrieval, analytique et code d’intégration pour un delivery pragmatique."}
  faq:
    eyebrow: "Gouvernance et stratégie"
    title: "Questions fréquentes"
    lead: "Des réponses claires sur le support SAP, l’architecture side-by-side et l’IA pragmatique dans les opérations d’entreprise."
    items:
      - {question: "Pouvez-vous améliorer le support SAP sans remplacer le fournisseur actuel ?", answer: "Oui. Le point de départ habituel n’est pas le remplacement du fournisseur, mais des responsabilités plus claires, de meilleures passations, un diagnostic plus solide et moins d’effort répété."}
      - {question: "Qu’est-ce qu’une architecture side-by-side autour de SAP ?", answer: "Elle maintient le core SAP propre tout en plaçant automatisation, mini-apps et workflows activés par l’IA dans des services side-by-side plus flexibles."}
      - {question: "Comment réduire les incidents SAP récurrents ?", answer: "En identifiant le schéma répété : passation faible, mémoire opérationnelle manquante, contrôles insuffisants, points d’intégration fragiles ou conception de processus non résolue."}
      - {question: "Comment utiliser l’IA autour de SAP sans problèmes de gouvernance ?", answer: "Utiliser l’IA side-by-side, l’ancrer dans le contexte opérationnel réel, journaliser les entrées et sorties importantes et garder visibles les points de contrôle du processus métier."}
      - {question: "Combien de temps prend une évaluation type ?", answer: "Généralement deux à quatre semaines, selon la complexité du paysage, le périmètre support et la disponibilité des bonnes personnes et des preuves."}
