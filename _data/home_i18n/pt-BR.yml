content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "Consultoria SAP para AMS, transformação e operações prontas para IA"
    subtitle: "Da estabilização operacional e do planejamento de desenvolvimento SAP à melhoria de processos, governança de dados e habilitação prática de IA."
    lead: "Ajudo organizações a estabilizar operações SAP, planejar as próximas etapas do desenvolvimento de sistemas e processos, melhorar a qualidade de dados e integrações e preparar equipes SAP para formas práticas de trabalho habilitadas por IA."
    current_role: "Meu trabalho conecta SAP AMS, SD/MM, logística, dados mestres, integrações, arquitetura e planejamento de delivery. O objetivo não é apenas resolver problemas atuais, mas definir o que melhorar depois, por que isso importa e como implementar com segurança."
    perspective: "Disponível para assessments SAP, roadmaps de transformação, otimização de AMS, diagnósticos de processos e dados, planejamento de solução, revisões de prontidão para IA e suporte focado à implementação."
    person_meta: "Consultoria SAP para operações, transformação e prontidão para IA"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "Discutir uma iniciativa SAP", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}, {label: "Explorar diagnósticos e recursos SAP", url: "/atlas/diagnostics/", style: secondary}]}
    visual: {header_label: "Senior SAP consulting<br>Operações · transformação · prontidão para IA", title: "Áreas de responsabilidade", items: [{title: "Operações SAP e melhoria de AMS", metric: "Estabilizar e melhorar", detail: "Reduzir problemas recorrentes, esclarecer responsabilidades, fortalecer diagnósticos e eliminar trabalho manual desnecessário."}, {title: "Transformação SAP e planejamento de desenvolvimento", metric: "Avaliar e priorizar", detail: "Identificar oportunidades de melhoria e criar roadmaps práticos para processos e sistemas."}, {title: "Processos e dados SAP prontos para IA", metric: "Preparar as bases", detail: "Melhorar contexto de processo, dados mestres, interfaces, conhecimento operacional e governança para casos controlados de IA e automação."}, {title: "Arquitetura e orientação de delivery", metric: "Conectar plano e execução", detail: "Conectar necessidades de negócio, capacidades SAP, restrições, riscos, sequenciamento e planos mensuráveis de delivery."}], signal_label: "Papel de consultoria", signal_detail: "Conectar realidade operacional, prioridades de negócio, arquitetura SAP e delivery."}
  analysis_problem:
    eyebrow: "Onde a mudança em SAP perde valor"
    title: "O problema"
    statement: "A lacuna entre mudança e operação"
    intro_paragraphs: ["A transformação SAP deve reduzir custos, aumentar o controle e abrir espaço para inovação — não prender a organização a uma fricção interminável de suporte.", "Em muitos ambientes SAP, projetos, AMS, arquitetura, operações de negócio e fornecedores ainda trabalham como mundos separados. O conhecimento é fragmentado, a transição é fraca, a responsabilidade é difusa, a lógica de integração fica oculta e as equipes de suporte redescobrem o contexto sob pressão.", "O resultado é caro: mudança lenta, defeitos repetidos, dependência de fornecedor, baixo reuso de conhecimento e pouca capacidade para inovação real. O sistema continua funcionando, mas a organização continua pagando para manter a complexidade em vez de melhorar como opera."]
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "Conhecimento fragmentado", tone: primary}, {icon: leak_remove, title: "Dependência de fornecedor", tone: neutral}]
    cta: {title: "Seu AMS é um centro de custo ou um catalisador?", detail: "Sair da manutenção reativa para a geração proativa de valor exige outra arquitetura de suporte, não apenas mais tickets, dashboards ou ferramentas.", label: "Iniciar análise de AMS", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "Assessoria estratégica 2026"
    title: "A IA está saindo dos pilotos e entrando no custo operacional."
    statement: "A pergunta de 2026 não é se as empresas comprarão IA, mas se o modelo operacional consegue provar valor, governar o uso e evitar mais uma camada de complexidade SAP."
    intro_quote: "O risco já não é experimentação abstrata. IA agêntica, copilots incorporados, SAP Joule, AI Units e assistentes customizados estão se tornando parte do cenário comercial e operacional."
    intro_detail: "Por isso, arquitetura, prontidão de dados, responsabilidade de processo e governança de uso tornam-se parte do business case. Sem essas bases, equipes SAP podem acumular mais recursos de IA, assinaturas e dívida de integração sem melhorar a qualidade da operação."
    mandate: {title: "Mandato de 2026", detail: "Trate a adoção de IA em SAP como decisão de modelo operacional, não apenas de ferramenta. Comece com contexto de processo limpo, conhecimento de suporte, responsabilidade de integração, casos de uso mensuráveis e guardrails para custos baseados em consumo."}
    stats: [{label: "Risco de IA agêntica", value: "40%+", detail: "A Gartner prevê que mais de 40% dos projetos de IA agêntica serão cancelados até o fim de 2027 quando os controles de custo, valor e risco são fracos.", source: "Fonte: Gartner", icon: trending_down, tone: light}, {label: "Presença de IA da SAP", value: "2.500+", detail: "A SAP informou mais de 2.500 Joule Skills e mais de 30 agentes especializados em sua atualização Business AI do 1º trimestre de 2026.", source: "Fonte: SAP", icon: hub, tone: mid}, {label: "Escala de IA corporativa", value: "8x", detail: "A OpenAI informou crescimento anual de oito vezes no volume de mensagens corporativas, mostrando que a adoção está ganhando fluxos repetíveis.", source: "Fonte: OpenAI", icon: verified, tone: dark}]
  strategic_context:
    eyebrow: "Contexto estratégico"
    title: "Por que isso importa agora"
    statement: "Isso não é mais apenas eficiência de TI. É capacidade de negócio."
    hero_cards:
      primary: {label: "Desempenho de mercado", value: "48%", title: "Apenas 48% das iniciativas digitais atingem ou superam metas de resultados de negócio.", source: "Fonte: Gartner", icon: monitoring}
      visual: {quote: "A fundação determina a função. A infraestrutura é a parceira silenciosa da inovação.", icon: architecture}
      ratio: {label: "Lacuna de desempenho de I&O", value: "28%", detail: "Infraestrutura e operações: apenas 28% dos casos de uso de IA são plenamente bem-sucedidos."}
      multiplier: {label: "O multiplicador de crescimento", title: "Organizações bem-sucedidas com IA investem", emphasis: "4x mais", detail: "em fundamentos.", icon: hub, tags: ["Qualidade de dados", "Governança", "Escalabilidade"]}
    quote: "Mudança SAP confiável exige uma base operacional confiável."
    quote_source: "Perspectiva operacional"
  credibility:
    eyebrow: "Por que confiar em mim"
    display_title: "Trajetória profissional"
    portrait_alt: "Retrato de Dzmitryi Kharlanau"
    portrait_label: "Contexto"
    portrait_value: "Ambiente corporativo"
    narrative: ["Trabalho na interseção entre transformação SAP, AMS, dados mestres e IA prática.", "Atualmente sou Senior SAP Consultant na EPAM Systems, trabalhando em ambientes de transformação SAP onde delivery de projeto, pressão de suporte, complexidade de integração, qualidade de dados e estabilidade operacional se encontram.", "Minha trajetória SAP começou em 2014 com SAP University Alliances, TERP10 e certificação SAP SD. Desde então, mais de 12 anos de trabalho prático em suporte SAP, logística, migração, dados mestres e análise operacional moldaram minha perspectiva — para que a mudança em SAP funcione não só no desenho, mas também após go-live, transição e na operação diária.", "As opiniões e materiais deste site são pessoais e independentes."]
    link_label: "Contato no LinkedIn"
    link_aria_label: "Contatar Dzmitryi Kharlanau no LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP e processos", ai_automation: "IA e automação", build_delivery: "Construção e delivery"}
    items: [{label: "SAP S/4HANA", summary: "Trabalho de processo SAP core, estabilização de AMS, suporte à migração e decisões Clean Core."}, {label: "SAP MDG", summary: "Governança de dados mestres, clareza de responsabilidade e controles para execução confiável de processos."}, {label: "OpenAI", summary: "Fluxos de LLM e padrões de retrieval para conhecimento de suporte, triagem e diagnóstico."}, {label: "Google ADK", summary: "Orquestração de agentes para fluxos estruturados de suporte e uso controlado de ferramentas."}, {label: "Anthropic", summary: "Raciocínio e prompting governado para trabalho de produção em que o controle importa."}, {label: "AWS", summary: "Runtime em nuvem para serviços sidecar, integrações e ferramentas operacionais modulares."}, {label: "Google Cloud", summary: "Infraestrutura de IA e serviços de dados para soluções side-by-side."}, {label: "Next.js", summary: "Interfaces para ferramentas internas e fluxos habilitados por IA que exigem velocidade e clareza."}, {label: "Python / Data", summary: "Automação, retrieval, análise e glue code para delivery prático."}]
  faq:
    eyebrow: "Governança e estratégia"
    title: "Perguntas frequentes"
    lead: "Respostas claras sobre suporte SAP, arquitetura side-by-side e IA prática em operações corporativas."
    items: [{question: "Você pode melhorar o suporte SAP sem substituir o fornecedor atual?", answer: "Sim. O ponto de partida usual não é trocar o fornecedor, mas ter responsabilidades mais claras, transições melhores, diagnóstico mais forte e menos esforço repetido."}, {question: "O que é arquitetura side-by-side ao redor de SAP?", answer: "Ela mantém o core SAP limpo enquanto leva automação, miniapps e fluxos habilitados por IA a serviços side-by-side mais flexíveis."}, {question: "Como reduzir incidentes SAP recorrentes?", answer: "Encontrando o padrão repetido: transição fraca, memória operacional ausente, controles deficientes, pontos frágeis de integração ou desenho de processo não resolvido."}, {question: "Como usar IA ao redor de SAP sem problemas de governança?", answer: "Use IA side-by-side, fundamente-a no contexto operacional real, registre as entradas e saídas importantes e mantenha visíveis os pontos de controle do processo de negócio."}, {question: "Quanto tempo leva uma avaliação típica?", answer: "Geralmente de duas a quatro semanas, conforme a complexidade do landscape, o escopo do suporte e a rapidez com que as pessoas e evidências certas ficam disponíveis."}]
