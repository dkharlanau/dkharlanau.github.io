content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "SAP AMS, AI-ondersteunde supportautomatisering en procesoptimalisatie"
    subtitle: "Ik werk aan SAP AMS-support, incidentanalyse, SD/MM-vraagstukken, masterdataproblemen en AI-ondersteunde workflows die supportteams helpen herhaald werk te verminderen en operationele kennis te verbeteren."
    current_role: 'Gebouwd op praktijkervaring met SAP-support, logistiek, masterdata, migratie en operationele analyse — momenteel als Senior SAP Consultant bij <a href="https://www.epam.com" target="_blank" rel="noopener noreferrer">EPAM Systems</a>.'
    person_meta: "Advies over SAP AMS en supportautomatisering"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "Verbinden op LinkedIn", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}]}
    visual: {header_label: "Lagere TCO $ ↓<br>Minder afhankelijkheid<br>Meer innovatie ↑", title: "Operationele waardekringloop", items: [{title: "Operationele kosten verlagen", metric: "↓ 10–20% delivery-overhead", detail: "Verminder herhaalde analyses, terugkerende supportinspanning en vermijdbare coördinatie."}, {title: "Afhankelijkheid verlagen", metric: "↑ 20–40% herbruikbare kennis", detail: "Maak kritieke, door leveranciers vastgehouden context tot een operationeel asset van de klant."}, {title: "Innovatiecapaciteit creëren", metric: "↑ 15–25% verandervermogen", detail: "Maak tijd en budget vrij voor automatisering, AI en schaalbare Clean Core-verandering."}], signal_label: "Praktische AI", signal_detail: "Gebouwd op herbruikbare operationele kennis rond een schone core."}
  analysis_problem:
    eyebrow: "Waar SAP-verandering waarde verliest"
    title: "Het probleem"
    statement: "De kloof tussen verandering en operatie"
    intro_paragraphs: ["SAP-transformatie moet kosten verlagen, controle verhogen en ruimte voor innovatie creëren — niet de organisatie vastzetten in eindeloze supportfrictie.", "In veel SAP-omgevingen werken projecten, AMS, architectuur, bedrijfsvoering en leveranciers nog als afzonderlijke werelden. Kennis is versnipperd, overdracht is zwak, eigenaarschap is onduidelijk, integratielogica blijft verborgen en supportteams herontdekken context onder druk.", "Het resultaat is duur: trage verandering, terugkerende defecten, leveranciersafhankelijkheid, beperkt kennisgebruik en weinig capaciteit voor echte innovatie. Het systeem blijft draaien, maar de organisatie blijft betalen om complexiteit in stand te houden in plaats van haar operatie te verbeteren."]
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "Versnipperde kennis", tone: primary}, {icon: leak_remove, title: "Vendor lock-in", tone: neutral}]
    cta: {title: "Is uw AMS een kostenpost of een katalysator?", detail: "Van reactief onderhoud naar proactieve waardecreatie gaan vereist een andere supportarchitectuur, niet alleen meer tickets, dashboards of tooling.", label: "Start AMS-analyse", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "Strategisch advies 2026"
    title: "AI verschuift van pilots naar operationele kosten."
    statement: "De vraag in 2026 is niet of ondernemingen AI kopen, maar of het operating model waarde kan aantonen, gebruik kan besturen en een extra laag SAP-complexiteit kan voorkomen."
    intro_quote: "Het risico is niet langer abstract experimenteren. Agentic AI, ingebedde copilots, SAP Joule, AI Units en maatwerkassistenten worden onderdeel van het commerciële en operationele landschap."
    intro_detail: "Daarmee worden architectuur, datagereedheid, proceseigenaarschap en gebruiksgovernance onderdeel van de businesscase. Zonder die basis kunnen SAP-teams meer AI-functies, abonnementen en integratieschuld opstapelen zonder de run-kwaliteit te verbeteren."
    mandate: {title: "Mandaat 2026", detail: "Behandel SAP-AI-adoptie als een beslissing over het operating model, niet alleen als tooling. Begin met schone procescontext, supportkennis, integratie-eigenaarschap, meetbare use cases en guardrails voor verbruiksafhankelijke kosten."}
    stats: [{label: "Risico van agentic AI", value: "40%+", detail: "Gartner voorspelt dat meer dan 40% van agentic-AI-projecten eind 2027 wordt stopgezet als kosten-, waarde- en risicocontroles zwak zijn.", source: "Bron: Gartner", icon: trending_down, tone: light}, {label: "SAP AI-voetafdruk", value: "2.500+", detail: "SAP meldde meer dan 2.500 Joule Skills en ruim 30 gespecialiseerde agents in de Business AI-update van Q1 2026.", source: "Bron: SAP", icon: hub, tone: mid}, {label: "Schaal van enterprise-AI", value: "8x", detail: "OpenAI rapporteerde acht keer jaar-op-jaar groei in enterprise-berichtvolume, een teken dat adoptie naar herhaalbare workflows opschaalt.", source: "Bron: OpenAI", icon: verified, tone: dark}]
  strategic_context:
    eyebrow: "Strategische context"
    title: "Waarom dit nu telt"
    statement: "Dit is niet langer alleen een IT-efficiëntievraagstuk. Het is een bedrijfsvaardigheid."
    hero_cards:
      primary: {label: "Marktprestatie", value: "48%", title: "Slechts 48% van de digitale initiatieven haalt of overtreft doelen voor bedrijfsresultaten.", source: "Bron: Gartner", icon: monitoring}
      visual: {quote: "De basis bepaalt de functie. Infrastructuur is de stille partner van innovatie.", icon: architecture}
      ratio: {label: "Prestatiekloof in I&O", value: "28%", detail: "Infrastructuur en operations: slechts 28% van de AI-use-cases slaagt volledig."}
      multiplier: {label: "De groeiversneller", title: "Organisaties met succesvolle AI investeren", emphasis: "4x meer", detail: "in fundamenten.", icon: hub, tags: ["Datakwaliteit", "Governance", "Schaalbaarheid"]}
    quote: "Betrouwbare SAP-verandering vraagt om een betrouwbare operationele basis."
    quote_source: "Operationeel perspectief"
  credibility:
    eyebrow: "Waarom u mij kunt vertrouwen"
    display_title: "Professionele achtergrond"
    portrait_alt: "Portret van Dzmitryi Kharlanau"
    portrait_label: "Context"
    portrait_value: "Enterprise-omgeving"
    narrative: ["Ik werk op het snijvlak van SAP-transformatie, AMS, masterdata en praktische AI.", "Momenteel ben ik Senior SAP Consultant bij EPAM Systems, in SAP-transformatieomgevingen waar projectdelivery, supportdruk, integratiecomplexiteit, datakwaliteit en operationele stabiliteit samenkomen.", "Mijn SAP-loopbaan begon in 2014 via SAP University Alliances, TERP10 en SAP SD-certificering. Sindsdien heeft ruim twaalf jaar praktijkwerk in SAP-support, logistiek, migratie, masterdata en operationele analyse mijn perspectief gevormd: SAP-verandering laten werken in ontwerp én na go-live, overdracht en dagelijkse operatie.", "De opvattingen en materialen op deze site zijn persoonlijk en onafhankelijk."]
    link_label: "Contact via LinkedIn"
    link_aria_label: "Neem contact op met Dzmitryi Kharlanau op LinkedIn"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP en processen", ai_automation: "AI en automatisering", build_delivery: "Bouw en delivery"}
    items: [{label: "SAP S/4HANA", summary: "SAP-coreproceswerk, AMS-stabilisatie, migratieondersteuning en Clean Core-beslissingen."}, {label: "SAP MDG", summary: "Masterdatagovernance, helder eigenaarschap en controles voor betrouwbare procesuitvoering."}, {label: "OpenAI", summary: "LLM-workflows en retrievalpatronen voor supportkennis, triage en diagnostiek."}, {label: "Google ADK", summary: "Agentorchestratie voor gestructureerde supportworkflows en gecontroleerd toolgebruik."}, {label: "Anthropic", summary: "Reasoning en beheerst prompting voor productiewerk waar controle telt."}, {label: "AWS", summary: "Cloudruntime voor sidecar-services, integraties en modulaire operationele tools."}, {label: "Google Cloud", summary: "AI-infrastructuur en dataservices voor side-by-side-oplossingen."}, {label: "Next.js", summary: "Interfaces voor interne tools en AI-gestuurde workflows die snelheid en helderheid nodig hebben."}, {label: "Python / Data", summary: "Automatisering, retrieval, analytics en glue code voor praktische delivery."}]
  faq:
    eyebrow: "Governance en strategie"
    title: "Veelgestelde vragen"
    lead: "Heldere antwoorden over SAP-support, side-by-side-architectuur en praktische AI in enterprise-operations."
    items: [{question: "Kunt u SAP-support verbeteren zonder de huidige leverancier te vervangen?", answer: "Ja. Het gebruikelijke beginpunt is niet leveranciersvervanging, maar duidelijker eigenaarschap, sterkere overdracht, betere diagnostiek en minder herhaald werk."}, {question: "Wat is side-by-side-architectuur rond SAP?", answer: "Deze houdt de SAP-core schoon en verplaatst automatisering, mini-apps en AI-gestuurde workflows naar flexibelere side-by-side-services."}, {question: "Hoe verlaagt u terugkerende SAP-incidenten?", answer: "Door het terugkerende patroon te vinden: zwakke overdracht, ontbrekend operationeel geheugen, gebrekkige controles, fragiele integratiepunten of onopgelost procesontwerp."}, {question: "Hoe gebruikt u AI rond SAP zonder governanceproblemen?", answer: "Gebruik AI side-by-side, grond deze in echte operationele context, log de belangrijke inputs en outputs en houd de controlepunten van het bedrijfsproces zichtbaar."}, {question: "Hoe lang duurt een typische assessment?", answer: "Gewoonlijk twee tot vier weken, afhankelijk van de complexiteit van het landschap, de supportscope en hoe snel de juiste mensen en bewijzen beschikbaar zijn."}]
