content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "SAP AMS、AI 支持自动化与流程优化"
    subtitle: "我关注 SAP AMS 支持、事件分析、SD/MM 问题、主数据问题，以及帮助支持团队减少重复工作、提升运营知识复用的 AI 辅助工作流。"
    current_role: '以 SAP 支持、物流、主数据、迁移和运营分析的实践经验为基础；目前任职于 <a href="https://www.epam.com" target="_blank" rel="noopener noreferrer">EPAM Systems</a>，担任高级 SAP 顾问。'
    person_meta: "SAP AMS 与支持自动化咨询"
    profile: {image: "/assets/img/DzmitryiKharlanau.png", image_webp: "/assets/img/DzmitryiKharlanau.webp", image_avif: "/assets/img/DzmitryiKharlanau.avif", alt: "Dzmitryi Kharlanau", contacts: [{label: "在 LinkedIn 上联系", url: "https://www.linkedin.com/in/dkharlanau", external: true, style: primary}]}
    visual: {header_label: "更低的 TCO $ ↓<br>更少依赖<br>更多创新 ↑", title: "运营价值闭环", items: [{title: "降低运行成本", metric: "↓ 10–20% 交付开销", detail: "减少重复分析、反复发生的支持工作和可避免的协调成本。"}, {title: "降低依赖", metric: "↑ 20–40% 可复用知识", detail: "将供应商掌握的关键上下文转化为客户自有的运营资产。"}, {title: "释放创新能力", metric: "↑ 15–25% 变革能力", detail: "释放用于自动化、AI 和可规模化 Clean Core 变革的时间与预算。"}], signal_label: "务实的 AI", signal_detail: "以 Clean Core 周边可复用的运营知识为基础。"}
  analysis_problem:
    eyebrow: "SAP 变革失去价值的地方"
    title: "问题所在"
    statement: "变革与运行之间的断层"
    intro_paragraphs: ["SAP 转型应当降低成本、增强控制并为创新腾出空间，而不是让组织陷入无休止的支持摩擦。", "在许多 SAP 环境中，项目、AMS、架构、业务运营和供应商仍像彼此分离的世界。知识碎片化、交接薄弱、职责不清、集成逻辑隐蔽，支持团队只能在压力下重新梳理上下文。", "代价很高：变更缓慢、缺陷反复、供应商依赖、知识复用不足，以及真正创新的能力受限。系统仍在运行，组织却持续为维持复杂性付费，而不是改善运营方式。"]
    visual_image: {src: "/assets/img/home/ams-operational-intelligence.png", webp: "/assets/img/home/ams-operational-intelligence.webp"}
    visual_cards: [{icon: stack, title: "知识碎片化", tone: primary}, {icon: leak_remove, title: "供应商锁定", tone: neutral}]
    cta: {title: "您的 AMS 是成本中心，还是变革催化剂？", detail: "从被动维护转向主动创造价值，需要的是不同的支持架构，而不只是更多工单、仪表板或工具。", label: "开始 AMS 分析", url: "/services/ams-cost-center-catalyst/"}
  ai_costs_outcomes:
    eyebrow: "2026 战略咨询"
    title: "AI 正从试点走向运营成本。"
    statement: "2026 年的问题不再是企业会不会采购 AI，而是运营模型能否证明价值、治理使用，并避免再叠加一层 SAP 复杂性。"
    intro_quote: "风险已不再是抽象实验。Agentic AI、嵌入式 Copilot、SAP Joule、AI Units 和定制助手正成为商业和运营环境的一部分。"
    intro_detail: "因此，架构、数据准备度、流程责任和使用治理都成为业务案例的一部分。没有这些基础，SAP 团队可能累积更多 AI 功能、订阅和集成债务，却没有改善运行质量。"
    mandate: {title: "2026 年任务", detail: "将 SAP AI 采用视为运营模型决策，而不仅是工具决策。应从清晰的流程上下文、支持知识、集成责任、可衡量用例和面向按量计费成本的护栏开始。"}
    stats: [{label: "Agentic AI 风险", value: "40%+", detail: "Gartner 预测，到 2027 年底，超过 40% 的 Agentic AI 项目会因成本、价值和风险控制薄弱而被取消。", source: "来源：Gartner", icon: trending_down, tone: light}, {label: "SAP AI 覆盖规模", value: "2,500+", detail: "SAP 在其 2026 年第一季度 Business AI 更新中报告了 2,500 多项 Joule Skills 和 30 多个专业代理。", source: "来源：SAP", icon: hub, tone: mid}, {label: "企业 AI 规模", value: "8x", detail: "OpenAI 报告企业消息量同比增长八倍，表明采用正进入可重复的工作流。", source: "来源：OpenAI", icon: verified, tone: dark}]
  strategic_context:
    eyebrow: "战略背景"
    title: "为什么此刻重要"
    statement: "这已不只是 IT 效率问题，而是业务能力问题。"
    hero_cards:
      primary: {label: "市场表现", value: "48%", title: "仅 48% 的数字化计划达到或超过业务成果目标。", source: "来源：Gartner", icon: monitoring}
      visual: {quote: "基础决定功能。基础设施是创新的无声伙伴。", icon: architecture}
      ratio: {label: "I&O 绩效差距", value: "28%", detail: "基础设施与运营：只有 28% 的 AI 用例完全成功。"}
      multiplier: {label: "增长乘数", title: "成功应用 AI 的组织投入", emphasis: "4 倍更多", detail: "于基础能力。", icon: hub, tags: ["数据质量", "治理", "可扩展性"]}
    quote: "可靠的 SAP 变革需要可靠的运营基础。"
    quote_source: "运营视角"
  credibility:
    eyebrow: "为何值得信赖"
    display_title: "职业背景"
    portrait_alt: "Dzmitryi Kharlanau 肖像"
    portrait_label: "场景"
    portrait_value: "企业环境"
    narrative: ["我在 SAP 转型、AMS、主数据和务实 AI 的交汇处开展工作。", "目前我在 EPAM Systems 担任高级 SAP 顾问，服务于项目交付、支持压力、集成复杂性、数据质量和运营稳定性交织的 SAP 转型环境。", "我的 SAP 职业路径始于 2014 年的 SAP University Alliances、TERP10 和 SAP SD 认证。此后，超过 12 年的 SAP 支持、物流、迁移、主数据和运营分析实践塑造了我的视角：让 SAP 变革不仅在设计阶段有效，也在上线、交接和日常运营中真正落地。", "本网站的观点和材料均为个人独立意见。"]
    link_label: "通过 LinkedIn 联系"
    link_aria_label: "在 LinkedIn 上联系 Dzmitryi Kharlanau"
    link_url: "https://www.linkedin.com/in/dkharlanau"
  tech_stack:
    categories: {sap_process: "SAP 与流程", ai_automation: "AI 与自动化", build_delivery: "构建与交付"}
    items: [{label: "SAP S/4HANA", summary: "SAP 核心流程工作、AMS 稳定化、迁移支持和 Clean Core 决策。"}, {label: "SAP MDG", summary: "主数据治理、清晰的责任归属，以及可靠流程执行所需的控制。"}, {label: "OpenAI", summary: "用于支持知识、分流和诊断的 LLM 工作流与检索模式。"}, {label: "Google ADK", summary: "面向结构化支持工作流和受控工具使用的代理编排。"}, {label: "Anthropic", summary: "适用于重视控制的生产工作的推理与受治理的提示。"}, {label: "AWS", summary: "用于 sidecar 服务、集成和模块化运营工具的云运行环境。"}, {label: "Google Cloud", summary: "为 side-by-side 解决方案提供 AI 基础设施和数据服务。"}, {label: "Next.js", summary: "面向要求速度与清晰度的内部工具和 AI 工作流的界面。"}, {label: "Python / Data", summary: "用于务实交付的自动化、检索、分析和胶水代码。"}]
  faq:
    eyebrow: "治理与战略"
    title: "常见问题"
    lead: "关于 SAP 支持、side-by-side 架构和企业运营中务实 AI 的清晰回答。"
    items: [{question: "不更换现有供应商，也能改善 SAP 支持吗？", answer: "可以。通常的起点并非替换供应商，而是明确责任、加强交接、改善诊断并减少重复投入。"}, {question: "SAP 周边的 side-by-side 架构是什么？", answer: "它保持 SAP Core 的整洁，同时将自动化、小型应用和 AI 工作流放入更灵活的 side-by-side 服务。"}, {question: "如何减少反复发生的 SAP 事件？", answer: "找出其重复模式：交接薄弱、缺少运营记忆、控制不足、脆弱的集成点或未解决的流程设计。"}, {question: "如何在 SAP 周边使用 AI 而不产生治理问题？", answer: "以 side-by-side 方式使用 AI，基于真实运营上下文，记录重要输入与输出，并保持业务流程控制点清晰可见。"}, {question: "一次典型评估需要多久？", answer: "通常为两到四周，取决于 landscape 复杂度、支持范围以及相关人员和证据的可获得速度。"}]
