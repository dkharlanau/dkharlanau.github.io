content:
  hero:
    name: "Dzmitryi Kharlanau"
    title: "SAP-Beratung für AMS, Transformation und KI-fähige Prozesse"
    subtitle: "Von der Betriebsstabilisierung und SAP-Entwicklungsplanung bis zu Prozessverbesserung, Data Governance und praxisnaher KI-Einführung."
    lead: "Ich unterstütze Organisationen dabei, SAP-Operationen zu stabilisieren, die nächsten Schritte der System- und Prozessentwicklung zu planen, Daten- und Integrationsqualität zu verbessern und SAP-Teams auf praktikable KI-gestützte Arbeitsweisen vorzubereiten."
    current_role: "Meine Arbeit verbindet SAP AMS, SD/MM, Logistik, Stammdaten, Integrationen, Architektur und Delivery-Planung. Es geht nicht nur darum, aktuelle Probleme zu lösen, sondern auch darum, zu definieren, was als Nächstes verbessert werden sollte, warum es wichtig ist und wie es sicher umgesetzt werden kann."
    perspective: "Verfügbar für SAP-Assessments, Transformations-Roadmaps, AMS-Optimierung, Prozess- und Datendiagnostik, Lösungsplanung, KI-Readiness-Reviews und gezielte Implementierungsunterstützung."
    person_meta: "SAP-Beratung für Betrieb, Transformation und KI-Bereitschaft"
    profile:
      image: "/assets/img/DzmitryiKharlanau.png"
      image_webp: "/assets/img/DzmitryiKharlanau.webp"
      image_avif: "/assets/img/DzmitryiKharlanau.avif"
      alt: "Dzmitryi Kharlanau"
      contacts:
        - label: "SAP-Initiative besprechen"
          url: "https://www.linkedin.com/in/dkharlanau"
          external: true
          style: primary
        - label: "SAP-Diagnostik und Ressourcen erkunden"
          url: "/atlas/diagnostics/"
          style: secondary
    visual:
      header_label: "Senior SAP Consulting<br>Betrieb · Transformation · KI-Bereitschaft"
      title: "Verantwortungsbereiche"
      items:
        - title: "SAP-Betrieb und AMS-Verbesserung"
          metric: "Stabilisieren und verbessern"
          detail: "Wiederkehrende Probleme reduzieren, Verantwortlichkeiten klären, Diagnostik stärken und unnötige manuelle Arbeit abbauen."
        - title: "SAP-Transformation und Entwicklungsplanung"
          metric: "Bewerten und priorisieren"
          detail: "Verbesserungschancen identifizieren und praktikable Roadmaps für Prozess- und Systementwicklung erstellen."
        - title: "KI-fähige SAP-Prozesse und Daten"
          metric: "Grundlagen vorbereiten"
          detail: "Prozesskontext, Stammdaten, Schnittstellen, Betriebswissen und Governance für kontrollierte KI und Automatisierung verbessern."
        - title: "Architektur- und Delivery-Begleitung"
          metric: "Plan und Umsetzung verbinden"
          detail: "Geschäftsanforderungen mit SAP-Fähigkeiten, Lösungsgrenzen, Risiken, Sequenzierung und messbaren Delivery-Plänen verbinden."
      signal_label: "Beratungsrolle"
      signal_detail: "Operative Realität, Geschäftsprioritäten, SAP-Architektur und Delivery zusammenbringen."
  analysis_problem:
    eyebrow: "Wo SAP-Veränderung Wert verliert"
    title: "Das Problem"
    statement: "Die Lücke zwischen Veränderung und Betrieb"
    intro_paragraphs:
      - "Eine SAP-Transformation sollte Kosten senken, Kontrolle erhöhen und Raum für Innovation schaffen — statt das Unternehmen in endlose Support-Reibung zu binden."
      - "In vielen SAP-Landschaften arbeiten Projekte, AMS, Architektur, Fachbereiche und Anbieter weiterhin getrennt. Wissen ist fragmentiert, Übergaben sind schwach, Verantwortlichkeiten verschwimmen, Integrationslogik bleibt verborgen, und Support-Teams müssen unter Druck Kontext neu erarbeiten."
      - "Die Folgen sind teuer: langsame Veränderungen, wiederkehrende Fehler, Anbieterabhängigkeit, geringe Wissenswiederverwendung und wenig Kapazität für echte Innovation. Das System läuft weiter, doch die Organisation bezahlt weiter dafür, Komplexität zu verwalten statt ihre Arbeitsweise zu verbessern."
    visual_image:
      src: "/assets/img/home/ams-operational-intelligence.png"
      webp: "/assets/img/home/ams-operational-intelligence.webp"
    visual_cards:
      - icon: stack
        title: "Fragmentiertes Wissen"
        tone: primary
      - icon: leak_remove
        title: "Anbieter-Lock-in"
        tone: neutral
    cta:
      title: "Ist Ihr AMS ein Kostenblock oder ein Katalysator?"
      detail: "Der Wechsel von reaktiver Wartung zu proaktiver Wertschöpfung erfordert eine andere Support-Architektur — nicht einfach mehr Tickets, Dashboards oder Tools."
      label: "AMS-Analyse starten"
      url: "/services/ams-cost-center-catalyst/"
  ai_costs_outcomes:
    eyebrow: "Strategische Beratung 2026"
    title: "KI entwickelt sich vom Pilotprojekt zum Betriebskostenfaktor."
    statement: "2026 lautet die Frage nicht, ob Unternehmen KI kaufen werden. Entscheidend ist, ob das Betriebsmodell Wert nachweisen, Nutzung steuern und eine weitere Schicht SAP-Komplexität vermeiden kann."
    intro_quote: "Das Risiko liegt nicht mehr in abstrakten Experimenten. Agentische KI, eingebettete Copilots, SAP Joule, AI Units und kundenspezifische Assistenten werden Teil der kommerziellen und operativen Landschaft."
    intro_detail: "Damit werden Architektur, Datenreife, Prozessverantwortung und Nutzungs-Governance Teil des Business Case. Ohne diese Grundlagen können SAP-Teams mehr KI-Funktionen, Abonnements und Integrationsschulden anhäufen, ohne die Betriebsqualität zu verbessern."
    mandate:
      title: "Auftrag für 2026"
      detail: "SAP-KI-Einführung als Entscheidung über das Betriebsmodell behandeln, nicht nur als Tool-Entscheidung. Beginnen Sie mit sauberem Prozesskontext, Supportwissen, Integrationsverantwortung, messbaren Use Cases und Leitplanken für verbrauchsabhängige Kosten."
    stats:
      - label: "Risiko agentischer KI"
        value: "40%+"
        detail: "Gartner prognostiziert, dass bis Ende 2027 über 40 % der agentischen KI-Projekte eingestellt werden, wenn Kosten-, Wert- und Risikokontrollen schwach sind."
        source: "Quelle: Gartner"
        icon: trending_down
        tone: light
      - label: "SAP-KI-Footprint"
        value: "2.500+"
        detail: "SAP meldete in seinem Business-AI-Update für Q1 2026 mehr als 2.500 Joule Skills und über 30 spezialisierte Agents."
        source: "Quelle: SAP"
        icon: hub
        tone: mid
      - label: "Skalierung von Enterprise-KI"
        value: "8x"
        detail: "OpenAI berichtete ein achtfaches Wachstum des Enterprise-Nachrichtenvolumens gegenüber dem Vorjahr — ein Zeichen dafür, dass sich Nutzung in wiederholbare Workflows verlagert."
        source: "Quelle: OpenAI"
        icon: verified
        tone: dark
  strategic_context:
    eyebrow: "Strategischer Kontext"
    title: "Warum das jetzt zählt"
    statement: "Das ist nicht mehr nur ein Thema der IT-Effizienz. Es ist eine Frage der Geschäftsfähigkeit."
    hero_cards:
      primary:
        label: "Marktleistung"
        value: "48%"
        title: "Nur 48 % der Digitalinitiativen erreichen oder übertreffen ihre Zielwerte für Geschäftsergebnisse."
        source: "Quelle: Gartner"
        icon: monitoring
      visual:
        quote: "Die Grundlage bestimmt die Funktion. Infrastruktur ist der stille Partner der Innovation."
        icon: architecture
      ratio:
        label: "Leistungslücke bei I&O"
        value: "28%"
        detail: "Infrastruktur und Betrieb: Nur 28 % der KI-Anwendungsfälle sind vollständig erfolgreich."
      multiplier:
        label: "Der Wachstumshebel"
        title: "Organisationen mit erfolgreicher KI investieren"
        emphasis: "4x mehr"
        detail: "in Grundlagen."
        icon: hub
        tags: ["Datenqualität", "Governance", "Skalierbarkeit"]
    quote: "SAP-Veränderung wird nur dann zuverlässig, wenn die Betriebsgrundlage mitverändert wird."
    quote_source: "Operative Perspektive"
  credibility:
    eyebrow: "Warum Sie mir vertrauen können"
    display_title: "Beruflicher Hintergrund"
    portrait_alt: "Porträt von Dzmitryi Kharlanau"
    portrait_label: "Standort"
    portrait_value: "Enterprise-Kontext"
    narrative:
      - "Ich arbeite an der Schnittstelle von SAP-Transformation, AMS, Stammdaten und praktischer KI."
      - "Derzeit bin ich Senior SAP Consultant bei EPAM Systems und arbeite in SAP-Transformationsumgebungen, in denen Projektdelivery, Supportdruck, Integrationskomplexität, Datenqualität und operative Stabilität zusammenkommen."
      - "Mein SAP-Weg begann 2014 mit SAP University Alliances, TERP10 und der SAP-SD-Zertifizierung. Seitdem prägen mehr als 12 Jahre praktische Arbeit in SAP-Support, Logistik, Migration, Stammdaten und operativer Analyse meine Sicht — mit dem Fokus, SAP-Veränderung nicht nur im Design, sondern auch nach Go-live, Übergabe und im Tagesbetrieb wirksam zu machen."
      - "Die Ansichten und Materialien auf dieser Website sind persönlich und unabhängig."
    link_label: "Über LinkedIn kontaktieren"
    link_aria_label: "Dzmitryi Kharlanau auf LinkedIn kontaktieren"
    link_url: "https://www.linkedin.com/in/dkharlanau"
