  faq:
    eyebrow: "Governance & Strategie"
    title: "Häufig gestellte Fragen"
    lead: "Klare Antworten zu SAP-Support, Side-by-Side-Architektur und praktischer KI im Enterprise-Betrieb."
    items:
      - question: "Können Sie SAP-Support verbessern, ohne den aktuellen Anbieter zu ersetzen?"
        answer: "Ja. Der übliche Einstieg ist nicht der Anbieteraustausch, sondern klarere Verantwortung, bessere Übergaben, stärkere Diagnostik und weniger Wiederholungsaufwand."
      - question: "Was bedeutet Side-by-Side-Architektur rund um SAP?"
        answer: "Sie hält den SAP-Core sauber und verlagert Automatisierung, Mini-Apps und KI-gestützte Workflows in flexiblere Side-by-Side-Services."
      - question: "Wie lassen sich wiederkehrende SAP-Incidents reduzieren?"
        answer: "Indem man das wiederkehrende Muster dahinter findet: schwache Übergaben, fehlendes Betriebswissen, unzureichende Kontrollen, fragile Integrationspunkte oder ungelöstes Prozessdesign."
      - question: "Wie nutzen Sie KI rund um SAP ohne Governance-Probleme?"
        answer: "KI Side-by-Side einsetzen, auf realem Betriebskontext aufbauen, wichtige Eingaben und Ausgaben protokollieren und die Kontrollpunkte des Geschäftsprozesses sichtbar halten."
      - question: "Wie lange dauert eine typische Bewertung?"
        answer: "In der Regel zwei bis vier Wochen, abhängig von Landschaftskomplexität, Supportumfang und davon, wie schnell die richtigen Personen und Nachweise verfügbar sind."
