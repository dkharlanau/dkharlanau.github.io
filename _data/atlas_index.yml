# Atlas Topic Index
# Purpose: structured topic index for public knowledge pages so Professional Radar
# and agent-assisted updates can route content to the correct page without guessing.
# Created for: issue #2
# Last updated: 2026-05-26

meta:
  name: "Dzmitryi Kharlanau — Atlas Topic Index"
  description: "Topic-to-page routing index for public knowledge pages on SAP AMS, support, process reliability, integration, master data, AI-assisted support, and architecture."
  canonical: "https://dkharlanau.github.io/ai/discovery-map.json"
  updated_at: "2026-07-24"
  version: "1.0"

# Fallback routing rule: unknown topics route to watch/unclassified, not random page.
fallback:
  rule: "If a topic does not match any cluster or keywords below, route it to the watch/unclassified queue and do not place it on an existing page. Create an issue for review instead."
  target_page: null
  target_cluster: "unclassified"
  action: "create_issue"

