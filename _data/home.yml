genai_operating_model:
  title: "Old SAP operating models turn operational history into recurring cost"
  statement: "There is no GenAI-ready AMS inside the old support model. It has to be built as an operational intelligence layer around SAP."
  intro: "Traditional AMS was built for the ERP stabilization era: resolve the ticket, coordinate the vendor, keep the system available. That model protects continuity, but it leaves value on the table when every incident, change, data defect, and integration issue is analyzed almost from scratch."
  old_model:
    eyebrow: "The Old Model"
    icon: "history"
    items:
      - label: "History"
        detail: "Built for post-go-live stabilization: SLA compliance, ticket closure, and vendor coordination."
      - label: "Cost Pattern"
        detail: "Repeat analysis, weak handover, and tribal memory create hidden run cost in every incident and change."
      - label: "Value Loss"
        detail: "The same root causes, interface failures, master-data issues, and process gaps reappear without becoming reusable assets."
      - label: "Velocity"
        detail: "Change slows because automation has no clean knowledge base, dependency map, or validated operating context."
      - label: "Impact"
        detail: "AMS keeps support alive, but absorbs budget that could fund simplification, automation, and innovation."
  new_needs:
    eyebrow: "What is Now Needed"
    icon: "psychology"
    items:
      - label: "Intelligence"
        detail: "Structured operational knowledge that AI can retrieve, compare, explain, and reuse."
      - label: "Economics"
        detail: "A value case tied to lower repeat tickets, faster MTTR, reduced handover effort, and fewer manual checks."
      - label: "Architecture"
        detail: "Side-by-side automation around SAP: process context, integration context, data context, and support history."
      - label: "Metrics"
        detail: "Track reuse rate, avoided analysis hours, automation coverage, backlog aging, defect recurrence, and change lead time."
      - label: "Velocity"
        detail: "Agentic loops that retrieve history, suggest root causes, validate evidence, draft actions, and accelerate support work."
      - label: "Vision"
        detail: "A model where AMS preserves continuity while compounding knowledge, savings, and improvement capacity."
  closing_quote: "The value is not one more AI feature. The value is converting years of SAP support history into reusable operational intelligence."
  closing_note: "Old AMS measures ticket closure."
  closing_emphasis: "New AMS measures knowledge reuse, avoided effort, faster recovery, and continuous improvement."

ai_costs_outcomes:
  eyebrow: "Strategic Advisory 2026"
  title: "AI is moving from pilots to operating cost."
  statement: "The 2026 question is not whether enterprises will buy AI. It is whether the operating model can prove value, govern usage, and avoid another layer of SAP complexity."
  intro_quote: "The risk is no longer abstract experimentation. Agentic AI, embedded copilots, SAP Joule, AI Units, and custom assistants are becoming part of the commercial and operational landscape."
  intro_detail: "That makes architecture, data readiness, process ownership, and usage governance part of the business case. Without those foundations, SAP teams can accumulate more AI features, more subscriptions, and more integration debt without improving run quality."
  mandate:
    title: "2026 Mandate"
    detail: "Treat SAP AI adoption as an operating-model decision, not only a tooling decision. Start with clean process context, support knowledge, integration ownership, measurable use cases, and guardrails for consumption-based cost."
