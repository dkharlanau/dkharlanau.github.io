faq:
  eyebrow: "Governance & Strategy"
  title: "Frequently Asked Questions"
  lead: "Clear answers about SAP support, side-by-side architecture, and practical AI in enterprise operations."
  items:
    - question: "Can you help improve SAP support without replacing the current provider?"
      answer: "Yes. The usual starting point is not vendor replacement. It is clearer ownership, stronger handover, better diagnostics, and less repeated effort."
    - question: "What is side-by-side architecture around SAP?"
      answer: "It keeps the SAP core clean while moving automation, mini apps, and AI-enabled workflows into more flexible side-by-side services."
    - question: "How do you reduce recurring SAP incidents?"
      answer: "By finding the repeat pattern behind them: weak handover, missing operational memory, poor controls, fragile integration points, or unresolved process design."
    - question: "How do you use AI around SAP without governance problems?"
      answer: "Use AI side-by-side, ground it in real operational context, log the important inputs and outputs, and keep the business process control points visible."
    - question: "How long does a typical assessment take?"
      answer: "Usually two to four weeks, depending on landscape complexity, support scope, and how quickly the right people and evidence are available."
