analysis_problem:
  eyebrow: "Phase 01 - Analysis"
  title: "The Problem"
  statement: "AMS should create business value, not just resolve incidents."
  intro: "In many SAP environments, AMS is still delivered through an old model: fragmented knowledge, repeated analysis, weak handover, blurred ownership, and growing dependence on vendor-defined tooling and delivery structures."
  quote: "Systems stay running, but the organization keeps paying for avoidable friction, slow change, and low reuse of what it already knows."
  visual_cards:
    - icon: "stack"
      title: "Fragmented knowledge"
      tone: "primary"
    - icon: "leak_remove"
      title: "Vendor lock-in"
      tone: "neutral"
  deep_dive:
    - title: "Avoidable friction"
      detail: "Legacy AMS structures often optimize for ticket flow, not resolution efficiency. The result is that the same structural weaknesses return as recurring incidents instead of becoming root-cause fixes."
    - title: "The knowledge trap"
      detail: "When support knowledge stays inside individual consultants or vendor tooling, the organization loses institutional memory of its own processes, dependencies, and prior decisions."
    - title: "Delivery inertia"
      detail: "Standard support structures are rarely designed for fast adaptation. That slows down change, reduces responsiveness, and makes modernization harder than it should be."
  cta:
    title: "Is your AMS a cost center or a catalyst?"
    detail: "Moving from reactive maintenance to proactive value generation requires a different support architecture, not just more tickets, more dashboards, or more tooling."
    label: "Download Whitepaper"
    url: "/datasets/ams/"

