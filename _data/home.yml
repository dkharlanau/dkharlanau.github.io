  lead: "The work is aimed at SAP-heavy environments where support quality, integration reliability, and clean-core change capacity matter commercially."
  items:
    - title: "SAP Support Improvement"
      summary: "Reduce recurring issues, improve handover, tighten ownership, and turn support from reactive patching into a more disciplined operating capability."
    - title: "SAP AMS Transformation"
      summary: "Reshape AMS around prevention, reusable knowledge, and measurable service improvement instead of ticket volume and vendor dependency."
    - title: "SAP Process Diagnostics"
      summary: "Trace where O2C, logistics, master data, or integration flows break down and identify the operational, process, or design issues behind repeat disruption."
    - title: "SAP Integration Modernization"
      summary: "Improve resilience across SAP and surrounding systems, reduce friction in interface-heavy landscapes, and make integration problems easier to diagnose and govern."
    - title: "Clean-Core Side-by-Side Enablement"
      summary: "Keep SAP core stable while adding lightweight services, mini apps, and targeted automations around the edge where they create practical business value."
    - title: "Practical SAP + AI Enablement"
      summary: "Use AI where it helps teams work faster and with better context: triage support work, surface reusable knowledge, assist diagnostics, and support small operational tools."

