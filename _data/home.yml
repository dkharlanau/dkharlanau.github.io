analysis_problem:
  eyebrow: "Where SAP change loses value"
  title: "The Problem"
  statement: "The change-to-run gap"
  intro_paragraphs:
    - "SAP transformation should reduce cost, increase control, and create room for innovation - not lock the organization into endless support friction."
    - "In many SAP environments, projects, AMS, architecture, business operations, and vendors still work as separate worlds. Knowledge is fragmented, handover is weak, ownership is blurred, integration logic is hidden, and support teams rediscover context under pressure."
    - "The result is expensive: slow change, repeated defects, vendor dependency, low reuse of knowledge, and limited capacity for real innovation. The system keeps running, but the organization keeps paying to maintain complexity instead of improving how it operates."
  visual_image:
    src: "/assets/img/home/ams-operational-intelligence.png"
    webp: "/assets/img/home/ams-operational-intelligence.webp"
  visual_cards:
    - icon: "stack"
      title: "Fragmented knowledge"
      tone: "primary"
    - icon: "leak_remove"
      title: "Vendor lock-in"
      tone: "neutral"
  cta:
    title: "Is your AMS a cost center or a catalyst?"
    detail: "Moving from reactive maintenance to proactive value generation requires a different support architecture, not just more tickets, more dashboards, or more tooling."
    label: "Start AMS Analysis"
    url: "/services/ams-cost-center-catalyst/"

