ai_costs_outcomes:
  eyebrow: "Strategic Advisory 2024"
  title: "Costs rise. Outcomes do not."
  statement: "Enterprises are spending more on AI and digital change, but results are still weak."
  intro_quote: "The problem gets worse when organizations keep adding products without redesigning how operations work. This creates overlapping AI copilots, multiple RAG stacks, and AI sprawl: more tools, more overlap, and less control."
  intro_detail: "SAP is moving AI into a broader commercial model through Joule and AI Units. Clients now need to think harder about architecture, TCO, and dependency before buying more features. The current trajectory leads to diminishing returns unless architectural foundation work comes before procurement."
  mandate:
    title: "Architectural Mandate"
    detail: "Success in the SAP ecosystem now requires a pivot from feature adoption to foundation engineering. Integration and data quality are no longer support functions. They are primary determinants of AI ROI."
  stats:
    - label: "Target Performance"
      value: "48%"
      detail: "Only 48% of digital initiatives meet or exceed business outcome targets."
      source: "Source: Gartner"
      icon: "trending_down"
      tone: "light"
    - label: "I&O AI Maturity"
      value: "28%"
      detail: "In infrastructure and operations, only 28% of AI use cases fully succeed and meet ROI expectations."
      source: "Field Analysis"
      icon: "warning"
      tone: "mid"
    - label: "Foundation Multiplier"
      value: "4x"
      detail: "Successful AI organizations invest up to 4x more in foundations such as data quality and governance than in tools alone."
      source: "Success Benchmark"
      icon: "verified"
      tone: "dark"
  audit_items:
    - title: "The Sprawl Audit"
      detail: "Identify overlapping copilots and disparate RAG stacks across the SAP and BTP environment to consolidate cost and reduce duplication."
    - title: "TCO Recalibration"
      detail: "Assess AI Units consumption against real-world outcome delivery and shift from fixed feature cost to value-based compute."
    - title: "Governance First"
      detail: "Implement data-quality gates and architectural controls before deploying Joule across critical business processes."

